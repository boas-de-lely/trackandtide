<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Track & Tide</title>
<link rel="icon" href="icon.png" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root {
  --bg: #1f2937;
  --panel: rgba(31,41,55,0.75);
  --text: #ffffff;
  --border: rgba(255,255,255,0.08);
  --hover: #60a5fa;
  --active: #3b82f6;
  --ferry: #38bdf8;
}

:root.light {
  --bg: #d5d9e2;
  --panel: #f8fafc;
  --text: #111827;
  --border: rgba(15,23,42,0.16);
}

html,
body {
  margin: 0;
  min-height: 100%;
  font-family: system-ui;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 14px 20px;
}

header img {
  width: 200px;
}

.main-nav {
  display: flex;
  gap: 0.35rem;
  flex-wrap: wrap;
  justify-content: center;
}

.main-nav a {
  color: var(--text);
  text-decoration: none;
  padding: 0.55rem 0.75rem;
  border-radius: 999px;
  opacity: 0.78;
  border: 1px solid transparent;
}

.main-nav a:hover,
.main-nav a.active {
  opacity: 1;
  background: var(--panel);
  border-color: var(--border);
}

/* TOGGLE */
.toggle {
  cursor: pointer;
  padding: 8px 14px;
  border-radius: 999px;
  background: var(--panel);
  border: 1px solid var(--border);
}

/* LAYOUT */
.container {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 1rem;
  padding: 1rem;
  align-items: start;
}

/* MAP */
.map-column {
  position: sticky;
  top: 1rem;
  align-self: start;
}

#map {
  height: 75vh;
  border-radius: 16px;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  background: var(--panel);
  padding: 1rem;
  border-radius: 16px;
  border: 1px solid var(--border);
  max-height: calc(100vh - 140px);
  overflow-y: auto;
  transition: max-height 0.25s ease;
  box-shadow: 0 14px 35px rgba(0,0,0,0.12);
}

/* MOBILE */
@media (max-width: 900px) {
  .container {
    grid-template-columns: 1fr;
  }
  header {
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .main-nav {
    order: 3;
    width: 100%;
    justify-content: flex-start;
  }
  .map-column {
    position: sticky;
    top: 0;
    z-index: 2;
    height: auto;
    align-self: auto;
  }
  #map {
    height: 46vh;
    border-radius: 0;
  }
  .station-toggle {
    margin: 0;
  }
  .sidebar {
    position: relative;
    max-height: calc(100vh - 46vh - 3.5rem);
    overflow-y: auto;
    border-radius: 20px 20px 0 0;
    border-bottom: none;
    margin-top: 0;
    z-index: 1;
  }
}

/* cards */
.card {
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 10px;
  overflow: hidden;
}

:root.light .card {
  background: rgba(15,23,42,0.04);
}

.card summary {
  list-style: none;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 12px;
  cursor: pointer;
  outline: none;
}

.card summary::-webkit-details-marker {
  display: none;
}

.card summary::after {
  content: "▾";
  margin-left: auto;
  font-size: 1rem;
  transition: transform 0.2s ease;
}

.card[open] summary::after {
  transform: rotate(-180deg);
}

.card-logo {
  width: 40px;
  height: 40px;
  object-fit: contain;
  border-radius: 10px;
  background: rgba(255,255,255,0.12);
  flex-shrink: 0;
}

.card-body {
  display: grid;
  gap: 0.25rem;
}

.card-title {
  font-weight: 700;
}

.card-subtitle {
  font-size: 0.88rem;
  color: var(--text);
  opacity: 0.8;
}

.card-description {
  font-size: 0.9rem;
  color: var(--text);
  opacity: 0.9;
  margin-top: 0.3rem;
  line-height: 1.4;
}

.country-description {
  margin: 0.6rem 0 0.55rem;
  color: var(--text);
  opacity: 0.82;
  line-height: 1.6;
}

.station-count {
  margin: 0 0 1rem;
  color: var(--text);
  opacity: 0.72;
  font-size: 0.92rem;
}

.ferry-route-panel {
  margin-bottom: 1rem;
}

.route-help {
  margin: 0.3rem 0 0.8rem;
  color: var(--text);
  opacity: 0.75;
  font-size: 0.92rem;
}

.route-list {
  display: grid;
  gap: 0.5rem;
}

.route-item {
  width: 100%;
  text-align: left;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 0.75rem 0.85rem;
  background: rgba(255,255,255,0.05);
  color: var(--text);
  cursor: pointer;
  transition: background 0.2s ease, border-color 0.2s ease;
}

.route-item:hover,
.route-item.active {
  background: rgba(56,189,248,0.18);
  border-color: rgba(56,189,248,0.4);
}

.route-tag {
  display: inline-block;
  margin-left: 0.5rem;
  color: var(--hover);
  opacity: 0.9;
  font-size: 0.85rem;
}

.route-countries {
  margin-top: 1rem;
  color: var(--text);
  opacity: 0.85;
  font-size: 0.95rem;
}

.station-toggle {
  display: inline-flex;
  gap: 0.45rem;
  align-items: center;
  margin-top: 0.35rem;
  padding: 0.2rem 0.05rem;
  cursor: pointer;
  user-select: none;
}

.station-toggle input {
  width: 1rem;
  height: 1rem;
  accent-color: #10b981;
  cursor: pointer;
}

.station-toggle input:disabled,
.station-toggle input:disabled ~ .station-toggle-text {
  opacity: 0.45;
}

.station-toggle-title {
  display: block;
  font-weight: 700;
}

.station-detail {
  margin-bottom: 1rem;
  padding: 0.85rem;
  border-radius: 14px;
  border: 1px solid rgba(16,185,129,0.35);
  background: rgba(16,185,129,0.12);
}

.station-detail h3 {
  margin: 0 0 0.45rem;
  font-size: 1.05rem;
}

.station-detail p {
  margin: 0.25rem 0;
  color: var(--text);
  opacity: 0.84;
  font-size: 0.92rem;
}

.station-detail a {
  color: var(--hover);
  font-weight: 700;
  text-decoration: none;
}

.operator-routes h4 {
  margin: 1rem 0 0.5rem;
  color: var(--text);
  font-size: 1rem;
  font-weight: 600;
}

.card-extra {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  padding: 0 12px 12px;
  border-top: 1px solid rgba(255,255,255,0.08);
}

.card-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.75rem 0.85rem;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--text);
  text-decoration: none;
  font-size: 0.95rem;
  transition: background 0.2s ease, transform 0.2s ease;
}

.card-button-primary {
  background: var(--active);
  border-color: rgba(255,255,255,0.18);
}

.card-button-primary:hover {
  background: var(--hover);
}

.app-badges {
  display: flex;
  gap: 0.65rem;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
}

.app-badge {
  display: inline-flex;
  height: 3rem;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
}

.app-badge img {
  height: 100%;
  width: auto;
  max-width: 140px;
  object-fit: contain;
  display: block;
}

.card-button:hover,
.app-badge:hover {
  transform: translateY(-1px);
}
</style>
</head>

<body>

<header>
  <img id="logo" src="trackandtide logo full.png" />
  <nav class="main-nav" aria-label="Main navigation">
    <a href="./" class="active">Map</a>
    <a href="stations">Stations</a>
    <a href="operators">Operators</a>
  </nav>
  <div class="toggle" id="themeToggle">Light mode</div>
</header>

<div class="container">
  <div class="map-column">
    <div id="map"></div>
    <label class="station-toggle">
      <input type="checkbox" id="stationToggle" disabled />
      <span class="station-toggle-text">
        <span class="station-toggle-title">Show stations</span>
      </span>
    </label>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-content" id="sidebarContent">
      <h2>Track & Tide</h2>
      <p>Select a country or ferry route.</p>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* =========================
   THEME
========================= */
const root = document.documentElement;
const toggle = document.getElementById("themeToggle");
const sidebar = document.getElementById("sidebar");
const sidebarContent = document.getElementById("sidebarContent");
const stationToggle = document.getElementById("stationToggle");

function setTheme(mode) {
  if (mode === "light") root.classList.add("light");
  else root.classList.remove("light");
  localStorage.setItem("trackandtide:theme", mode);

  toggle.textContent = root.classList.contains("light")
    ? "Dark mode"
    : "Light mode";

  const logo = document.getElementById("logo");
  logo.src = mode === "light" ? "trackandtide logo full.png" : "logo full light.png";

  updateMap(mode);
}

function detectTheme() {
  const savedTheme = localStorage.getItem("trackandtide:theme");
  if (savedTheme) return savedTheme;
  return window.matchMedia('(prefers-color-scheme: light)').matches ? "light" : "dark";
}

toggle.onclick = () => {
  setTheme(root.classList.contains("light") ? "dark" : "light");
};

/* =========================
   MAP
========================= */
const map = L.map('map', {
  worldCopyJump: true
}).setView([54, 15], 4);

let baseLayer;
let railwayLayer;
let currentTheme = "dark";

function updateMap(mode) {
  if (baseLayer && map.hasLayer(baseLayer)) {
    map.removeLayer(baseLayer);
  }
  if (railwayLayer && map.hasLayer(railwayLayer)) {
    map.removeLayer(railwayLayer);
  }

  currentTheme = mode;

  baseLayer = L.tileLayer(
    mode === "light"
      ? "https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png"
      : "https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png"
  ).addTo(map);

  railwayLayer = L.tileLayer(
    "https://{s}.tiles.openrailwaymap.org/standard/{z}/{x}/{y}.png",
    { opacity: mode === "light" ? 0.5 : 0.35 }
  ).addTo(map);

  map.invalidateSize();
}

setTheme(detectTheme());


/* =========================
   STATE
========================= */
let selectedLayer = null;
let countryData = {};
let ferryLines = [];
let ferryRouteLines = [];
let selectedFerryRouteName = null;
let ferryLineOffset = 0;
let visibleFerryRoutes = [];
let stationLayer = null;
let activeStationsCountry = null;
let currentSelectedCountry = null;
let stationDataset = { countries: {} };
const stationDataCache = {};
let stationLoadToken = 0;
let selectedStationMarker = null;

function isMobileViewport() {
  return window.matchMedia("(max-width: 900px)").matches;
}

function scrollMapToTop() {
  if (!isMobileViewport()) return;

  const mapColumn = document.querySelector(".map-column");
  if (!mapColumn) return;

  mapColumn.scrollIntoView({
    behavior: "smooth",
    block: "start"
  });

  setTimeout(() => map.invalidateSize(), 300);
}

function scrollSidebarIntoView() {
  sidebar.scrollIntoView({
    behavior: "smooth",
    block: "nearest"
  });
}

function scrollToActiveRoute() {
  const activeRoute = document.querySelector(".route-item.active");
  if (activeRoute) {
    activeRoute.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
  }
}

function clearFerryRouteLines() {
  ferryRouteLines.forEach(line => {
    if (map.hasLayer(line)) map.removeLayer(line);
  });
  ferryRouteLines = [];
  selectedFerryRouteName = null;
}

function clearStations() {
  if (stationLayer && map.hasLayer(stationLayer)) {
    map.removeLayer(stationLayer);
  }
  stationLayer = null;
  activeStationsCountry = null;
  selectedStationMarker = null;
}

function getStationCount(source) {
  return source?.counts?.total || source?.stations?.length || 0;
}

function getStationSource(countryName) {
  return stationDataset.countries?.[countryName] || null;
}

function cleanStationName(name) {
  return String(name || "")
    .replace(/\s+/g, " ")
    .replace(/^station\s+/i, "")
    .replace(/\s+station$/i, "")
    .replace(/\s+railway station$/i, "")
    .trim();
}

function getStationMarkerStyle(source) {
  if (source === "osm") {
    return {
      color: currentTheme === "light" ? "#92400e" : "#fbbf24",
      fillColor: currentTheme === "light" ? "#f59e0b" : "#f59e0b"
    };
  }

  return {
    color: currentTheme === "light" ? "#065f46" : "#6ee7b7",
    fillColor: currentTheme === "light" ? "#10b981" : "#34d399"
  };
}

function getStationMarkerOptions(station, selected = false) {
  const markerStyle = getStationMarkerStyle(station.source);

  return {
    radius: selected ? 7 : 5,
    color: selected ? "#ffffff" : markerStyle.color,
    weight: selected ? 3 : 2,
    fillColor: markerStyle.fillColor,
    fillOpacity: selected ? 1 : 0.92,
    opacity: 1
  };
}

function getStationHitAreaOptions() {
  return {
    radius: 14,
    color: "#ffffff",
    weight: 0,
    opacity: 0,
    fillOpacity: 0,
    interactive: true
  };
}

function getStationSourceUrl(station) {
  if (station.source === "wikidata") return station.url || station.id;

  return station.url || "https://www.openstreetmap.org";
}

function renderStationDetail(station) {
  const panel = document.getElementById("stationDetailPanel");
  if (!panel) return;

  const operators = station.operators?.length
    ? `<p>Operator: ${escapeHTML(station.operators.join(", "))}</p>`
    : "";
  const sourceLabel = station.source === "osm" ? "OpenStreetMap" : "Wikidata";
  const sourceUrl = getStationSourceUrl(station);

  panel.innerHTML = `
    <div class="station-detail">
      <h3>${escapeHTML(station.name)}</h3>
      ${operators}
      <p><a href="${escapeHTML(sourceUrl)}" target="_blank" rel="noopener">${sourceLabel} source</a></p>
    </div>
  `;

  scrollSidebarIntoView();
}

function selectStationMarker(marker, station) {
  if (selectedStationMarker && selectedStationMarker.setStyle) {
    selectedStationMarker.setStyle(getStationMarkerOptions(selectedStationMarker.stationData));
  }

  selectedStationMarker = marker;
  selectedStationMarker.stationData = station;
  marker.setStyle(getStationMarkerOptions(station, true));
  marker.bringToFront();
  renderStationDetail(station);
}

function clearStationDetail() {
  const panel = document.getElementById("stationDetailPanel");
  if (panel) panel.innerHTML = "";
}

function updateStationToggle() {
  const source = getStationSource(currentSelectedCountry);

  stationToggle.disabled = !source;
}

async function syncStationLayerForSelectedCountry() {
  const countryName = currentSelectedCountry;
  const source = getStationSource(countryName);
  const token = ++stationLoadToken;

  clearStationDetail();

  if (!countryName || !source || !stationToggle.checked) {
    clearStations();
    updateStationToggle();
    return;
  }

  stationToggle.disabled = true;

  try {
    const stations = await loadStations(countryName);
    if (token !== stationLoadToken || currentSelectedCountry !== countryName || !stationToggle.checked) return;

    renderStations(countryName, stations);
  } catch (error) {
    console.error(error);
    clearStations();
  } finally {
    if (token === stationLoadToken) {
      stationToggle.disabled = !getStationSource(currentSelectedCountry);
    }
  }
}

async function loadStations(countryName) {
  if (stationDataCache[countryName]) return stationDataCache[countryName];

  const source = getStationSource(countryName);
  if (!source) return [];

  const stations = (source.stations || [])
    .map(station => ({
      ...station,
      name: cleanStationName(station.name),
      lat: Number(station.lat),
      lng: Number(station.lng),
      operators: Array.isArray(station.operators) ? station.operators : []
    }))
    .filter(station =>
      station.name &&
      Number.isFinite(station.lat) &&
      Number.isFinite(station.lng)
    );

  stationDataCache[countryName] = stations;
  return stations;
}

function renderStations(countryName, stations) {
  clearStations();

  stationLayer = L.layerGroup();

  stations.forEach(station => {
    const marker = L.circleMarker([station.lat, station.lng], {
      ...getStationMarkerOptions(station),
      interactive: false
    });
    marker.stationData = station;

    const hitArea = L.circleMarker([station.lat, station.lng], getStationHitAreaOptions());

    marker.addTo(stationLayer);
    hitArea.bindTooltip(escapeHTML(station.name), { direction: "top", opacity: 0.9 });
    hitArea.on("click", () => selectStationMarker(marker, station));
    hitArea.addTo(stationLayer);
  });

  stationLayer.addTo(map);
  activeStationsCountry = countryName;
}

stationToggle.addEventListener("change", () => {
  syncStationLayerForSelectedCountry();
});

function getFerryLineStyle() {
  return {
    color: currentTheme === "light" ? "#0066cc" : "#38bdf8",
    opacity: currentTheme === "light" ? 0.4 : 0.18
  };
}

function clearFerryLines() {
  ferryLines.forEach(line => {
    if (map.hasLayer(line)) map.removeLayer(line);
  });
  ferryLines = [];
}

function setVisibleFerryRoutes(routes) {
  clearFerryLines();
  visibleFerryRoutes = routes || [];

  const ferryStyle = getFerryLineStyle();

  visibleFerryRoutes.forEach(route => {
    const curvedCoords = getCurvedRouteCoords(route.coords);

    const visibleLine = L.polyline(curvedCoords, {
      color: ferryStyle.color,
      weight: 3,
      opacity: ferryStyle.opacity,
      dashArray: "8,12",
      lineCap: "round",
      lineJoin: "round",
      smoothFactor: 1.5,
      interactive: false
    }).addTo(map);

    const clickLine = L.polyline(curvedCoords, {
      color: ferryStyle.color,
      weight: 24,
      opacity: 0,
      interactive: true
    }).addTo(map);

    clickLine.on("click", () => {
      showFerryRoute(route, false);

      document.querySelectorAll(".route-item").forEach(item => {
        item.classList.toggle("active", item.dataset.routeName === route.name);
      });

      const routeButton = Array.from(document.querySelectorAll(".route-item"))
        .find(item => item.dataset.routeName === route.name);
      const operatorName = routeButton?.dataset.operator || route.operator;
      const operatorCard = Array.from(document.querySelectorAll(".card[data-operator]"))
        .find(card => card.dataset.operator === operatorName);

      if (operatorCard) operatorCard.open = true;
      setTimeout(scrollToActiveRoute, 240);
    });

    ferryLines.push(visibleLine, clickLine);
  });
}

function degreesToRadians(deg) {
  return deg * Math.PI / 180;
}

function radiansToDegrees(rad) {
  return rad * 180 / Math.PI;
}

function getCurvedRouteCoords(coords) {
  if (coords.length < 2) return coords;

  const result = [];

  function tj(ti, pi, pj) {
    const dx = pj[0] - pi[0];
    const dy = pj[1] - pi[1];
    const dist = Math.sqrt(dx * dx + dy * dy);
    return ti + Math.pow(dist, 0.5);
  }

  function lerp(p1, p2, t) {
    return [
      p1[0] + (p2[0] - p1[0]) * t,
      p1[1] + (p2[1] - p1[1]) * t
    ];
  }

  for (let i = 0; i < coords.length - 1; i++) {
    const p0 = coords[i - 1] || coords[i];
    const p1 = coords[i];
    const p2 = coords[i + 1];
    const p3 = coords[i + 2] || p2;

    let t0 = 0;
    let t1 = tj(t0, p0, p1);
    let t2 = tj(t1, p1, p2);
    let t3 = tj(t2, p2, p3);

    const steps = 20;

    // 🔥 fallback als segment instabiel is
    if (t1 === t0 || t2 === t1 || t3 === t2) {
      for (let j = 0; j <= steps; j++) {
        result.push(lerp(p1, p2, j / steps));
      }
      continue;
    }

    for (let t = t1; t < t2; t += (t2 - t1) / steps) {

      const A1 = [
        ((t1 - t) / (t1 - t0)) * p0[0] + ((t - t0) / (t1 - t0)) * p1[0],
        ((t1 - t) / (t1 - t0)) * p0[1] + ((t - t0) / (t1 - t0)) * p1[1],
      ];

      const A2 = [
        ((t2 - t) / (t2 - t1)) * p1[0] + ((t - t1) / (t2 - t1)) * p2[0],
        ((t2 - t) / (t2 - t1)) * p1[1] + ((t - t1) / (t2 - t1)) * p2[1],
      ];

      const A3 = [
        ((t3 - t) / (t3 - t2)) * p2[0] + ((t - t2) / (t3 - t2)) * p3[0],
        ((t3 - t) / (t3 - t2)) * p2[1] + ((t - t2) / (t3 - t2)) * p3[1],
      ];

      const B1 = [
        ((t2 - t) / (t2 - t0)) * A1[0] + ((t - t0) / (t2 - t0)) * A2[0],
        ((t2 - t) / (t2 - t0)) * A1[1] + ((t - t0) / (t2 - t0)) * A2[1],
      ];

      const B2 = [
        ((t3 - t) / (t3 - t1)) * A2[0] + ((t - t1) / (t3 - t1)) * A3[0],
        ((t3 - t) / (t3 - t1)) * A2[1] + ((t - t1) / (t3 - t1)) * A3[1],
      ];

      const C = [
        ((t2 - t) / (t2 - t1)) * B1[0] + ((t - t1) / (t2 - t1)) * B2[0],
        ((t2 - t) / (t2 - t1)) * B1[1] + ((t - t1) / (t2 - t1)) * B2[1],
      ];

      if (!isNaN(C[0]) && !isNaN(C[1])) {
        result.push(C);
      }
    }
  }

  return result;
}

function focusFerryRoute(route) {
  if (!route?.coords?.length) return;

  const bounds = L.latLngBounds(getCurvedRouteCoords(route.coords));
  if (map.stop) map.stop();
  map.fitBounds(bounds, {
    padding: [35, 35],
    maxZoom: 7
  });
  scrollMapToTop();
}

function showFerryRoute(route, shouldFocusRoute = true) {
  clearFerryRouteLines();
  if (!route) return;

  const line = L.polyline(getCurvedRouteCoords(route.coords), {
    color: "#38bdf8",
    weight: 6,
    opacity: 0.95,
    dashArray: "12,10",
    lineCap: "round",
    lineJoin: "round"
  }).addTo(map);

  ferryRouteLines.push(line);
  selectedFerryRouteName = route.name;
  line.bringToFront();

  if (shouldFocusRoute) {
    focusFerryRoute(route);
  }
}

/* =========================
   SAFE NORMALIZE
========================= */
function norm(s) {
  return (s || "")
    .toLowerCase()
    .replace("kingdom of", "")
    .replace("republic of", "")
    .replace("the", "")
    .trim();
}

function escapeHTML(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

/* =========================
   LOAD DATA
========================= */
const countryZoomConfig = {
  "Netherlands": { center: [52.1, 5.3], zoom: 7 },
  "Germany": { center: [51.2, 10.4], zoom: 5 },
  "France": { center: [46.6, 2.2], zoom: 5 },
  "Italy": { center: [42.8, 12.5], zoom: 5 },
  "Spain": { center: [40.4, -3.7], zoom: 5 },
  "United Kingdom": { center: [54.5, -2.5], zoom: 5 },
  "Norway": { center: [64.5, 11.0], zoom: 4 },
  "Portugal": { center: [39.5, -8.0], zoom: 6 },
  "Russia": { center: [61.5, 100.0], zoom: 2},
  "Liechtenstein": { center: [47.14, 9.55], zoom: 10 }
};

Promise.all([
  fetch("https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson").then(r => r.json()),
  fetch("./data.json").then(r => r.json()),
  fetch("./ferries.json").then(r => r.json()),
  fetch("./stations.json")
    .then(r => r.ok ? r.json() : { countries: {} })
    .catch(() => ({ countries: {} }))
])
.then(([geo, data, ferries, stations]) => {

  countryData = data;
  stationDataset = stations || { countries: {} };

  const geoLayer = L.geoJSON(geo, {

    style: () => ({
      color: "#64748b",
      weight: 1,
      fillOpacity: 0
    }),

    onEachFeature: (feature, layer) => {

      layer.on("click", () => {

        const geoName =
          feature.properties.ADMIN ||
          feature.properties.NAME ||
          feature.properties.name ||
          "Unknown";

        const normalized = norm(geoName);
        const stationSource = getStationSource(geoName);
        currentSelectedCountry = geoName;

        if (activeStationsCountry && activeStationsCountry !== geoName) {
          clearStations();
        }

        /* MATCH */
        const operators = (countryData.operators || []).filter(op => {
          const opCountries = op.countries || [op.country];
          return opCountries.some(c => norm(c) === normalized);
        });

        const sortNationalOperatorsFirst = (a, b) => {
          const aIsNational = norm(a.country) === normalized;
          const bIsNational = norm(b.country) === normalized;

          if (aIsNational !== bIsNational) return aIsNational ? -1 : 1;
          return (a.name || "").localeCompare(b.name || "");
        };

        const trains = operators
          .filter(o => o.type === "trains")
          .sort(sortNationalOperatorsFirst);
        const ferryOperators = operators
          .filter(o => o.type === "ferries")
          .sort(sortNationalOperatorsFirst);

        const routeMatches = ferries.routes.filter(route =>
          route.countries?.some(country => norm(country) === normalized)
        );

        setVisibleFerryRoutes(routeMatches);

        const operatorRouteMap = {};
        routeMatches.forEach(route => {
          const op = route.operator || "Unknown";
          if (!operatorRouteMap[op]) operatorRouteMap[op] = [];
          operatorRouteMap[op].push(route);
        });

        const renderRouteButtons = (routes, operatorName) => routes.length ? `
            <div class="route-list">
              ${routes.map(route => `<button type="button" class="route-item" data-route-name="${escapeHTML(route.name)}" data-operator="${escapeHTML(operatorName)}">${escapeHTML(route.name)}${route.countries?.length ? ` <span class="route-tag">${escapeHTML(route.countries.join(" / "))}</span>` : ""}</button>`).join("")}
            </div>
          ` : "";

        const renderOperatorCard = (op, routeButtonsHtml = "") => `
          <details class="card" data-operator="${escapeHTML(op.name)}">
            <summary class="card-summary">
              ${op.logo ? `<img src="operator logos/${op.logo}" alt="${escapeHTML(op.name)} logo" class="card-logo" />` : ""}
              <div class="card-body">
                <div class="card-title">${escapeHTML(op.name)}</div>
                <div class="card-subtitle">${escapeHTML(op.operatorLabel || (op.type === 'trains' ? 'Train operator' : 'Ferry operator'))}</div>
            </summary>
            <div class="card-extra">
              ${op.description ? `<div class="card-description">${escapeHTML(op.description)}</div>` : ""}
              ${op.website ? `<a href="${op.website}" target="_blank" class="card-button card-button-primary">Visit website</a>` : ""}
              <div class="app-badges">
                ${op.appLinks?.android ? `<a href="${op.appLinks.android}" target="_blank" class="app-badge"><img src="get_it_on_google_play.png" alt="Get it on Google Play"></a>` : ""}
                ${op.appLinks?.ios ? `<a href="${op.appLinks.ios}" target="_blank" class="app-badge"><img src="get_it_on_apple.png" alt="Download on the App Store"></a>` : ""}
              </div>
              ${routeButtonsHtml}
            </div>
          </details>
        `;

        const countryInfo = countryData.countryInfo?.find(c => c.country === geoName);
        const countryDescription = countryInfo?.info || "";
        const stationCount = getStationCount(stationSource);
        const stationBreakdown = stationSource?.counts
          ? `${stationSource.counts.wikidata.toLocaleString()} Wikidata, ${stationSource.counts.osm.toLocaleString()} OSM`
          : "";

        sidebarContent.innerHTML = `
          <div id="stationDetailPanel"></div>
          <h2>${geoName}</h2>
          ${countryDescription ? `<p class="country-description">${escapeHTML(countryDescription)}</p>` : ""}
          ${stationSource ? `<p class="station-count">${stationCount.toLocaleString()} active stations in dataset${stationBreakdown ? ` (${escapeHTML(stationBreakdown)})` : ""}</p>` : ""}

          ${trains.length ? "<h3>Trains</h3>" : ""}
          ${trains.map(op => renderOperatorCard(op)).join("")}

          ${ferryOperators.length ? "<h3>Ferries</h3>" : ""}
          ${ferryOperators.map(op => renderOperatorCard(op, renderRouteButtons(operatorRouteMap[op.name] || [], op.name))).join("")}

        `;

        document.querySelectorAll(".route-item").forEach(button => {
          button.addEventListener("click", () => {
            const routeName = button.dataset.routeName;
            const operatorName = button.dataset.operator;
            const route = routeMatches.find(r => r.name === routeName);
            if (route) {
              showFerryRoute(route);
              document.querySelectorAll(".route-item").forEach(item => item.classList.toggle("active", item === button));

              const operatorCard = Array.from(document.querySelectorAll('.card[data-operator]'))
                .find(card => card.dataset.operator === operatorName);
              if (operatorCard) {
                operatorCard.open = true;
              }

              setTimeout(scrollToActiveRoute, 240);
            }
          });
        });

        updateStationToggle();
        syncStationLayerForSelectedCountry();

        clearFerryRouteLines();

        /* HIGHLIGHT */
        if (selectedLayer) geoLayer.resetStyle(selectedLayer);
        selectedLayer = layer;

        layer.setStyle({
          color: "#3b82f6",
          weight: 2,
          fillOpacity: 0.25
        });

        /* =========================
           FIXED ZOOM (NO OVERSEAS BUG)
        ========================= */
        try {
        const geoName =
          feature.properties.ADMIN ||
          feature.properties.NAME ||
          feature.properties.name ||
          "Unknown";

        // check custom config
        const zoomConfig = countryZoomConfig[geoName];

        if (zoomConfig) {
          map.flyTo(zoomConfig.center, zoomConfig.zoom, {
            duration: 0.9
          });
        } else {
          // fallback (safe bounding box)
          const bounds = layer.getBounds();

          map.fitBounds(bounds, {
            padding: [30, 30],
            maxZoom: 6
          });
        }

        } catch (e) {
          console.log("zoom fallback:", e);
          map.setView([20, 0], 3);
        }

        scrollMapToTop();

      });

    }

  }).addTo(map);

  /* =========================
     FERRY ROUTES
  ========================= */
  setVisibleFerryRoutes([]);

  setInterval(() => {
    ferryLineOffset++;
    ferryRouteLines.forEach(line => {
      if (line && line.setStyle) line.setStyle({ dashOffset: ferryLineOffset });
    });
  }, 60);

});

</script>

</body>
</html>
