<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operators — Track & Tide</title>
<meta name="description" content="Browse European train and ferry operators — logos, websites, apps, countries served, and more." />
<meta property="og:title" content="Operators — Track & Tide" />
<meta property="og:description" content="Browse European train and ferry operators — logos, websites, apps, countries served, and more." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://trackandtide.com/operators" />
<meta property="og:image" content="https://trackandtide.com/trackandtide%20logo%20full.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="Track & Tide — Operators" />
<meta property="og:locale" content="en_GB" />
<meta property="og:site_name" content="Track & Tide" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Operators — Track & Tide" />
<meta name="twitter:description" content="Browse European train and ferry operators — logos, websites, apps, countries served, and more." />
<meta name="twitter:image" content="https://trackandtide.com/trackandtide%20logo%20full.png" />
<link rel="canonical" href="https://trackandtide.com/operators" />
<link rel="icon" href="icon.png" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#1F2937" />

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": "Operators — Track & Tide",
  "url": "https://trackandtide.com/operators",
  "description": "Browse European train and ferry operators — logos, websites, apps, countries served, and more.",
  "isPartOf": {
    "@type": "WebApplication",
    "name": "Track & Tide",
    "url": "https://trackandtide.com/"
  }
}
</script>
<style>
:root {
  --bg: #1f2937;
  --panel: #1f2937;
  --card: #273549;
  --text: #ffffff;
  --text-secondary: #94A3B8;
  --border: rgba(255,255,255,0.08);
  --hover: #60a5fa;
  --active: #3b82f6;
}

:root.light {
  --bg: #d5d9e2;
  --panel: #ffffff;
  --card: #f8fafc;
  --text: #111827;
  --text-secondary: #6B7280;
  --border: rgba(15,23,42,0.16);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui;
  background: var(--bg);
  color: var(--text);
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  row-gap: 0.5rem;
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

header img {
  width: 200px;
}

.main-nav {
  display: flex;
  gap: 0.35rem;
  flex-wrap: wrap;
  justify-content: center;
}

.main-nav a {
  color: var(--text);
  text-decoration: none;
  padding: 0.55rem 0.75rem;
  border-radius: 999px;
  opacity: 0.78;
  border: 1px solid transparent;
}

.main-nav a:hover,
.main-nav a.active {
  opacity: 1;
  background: var(--card);
  border-color: var(--border);
}

.theme-switch { position: relative; display: inline-flex; align-items: center; width: 50px; height: 28px; flex-shrink: 0; }
.theme-switch input { opacity: 0; width: 0; height: 0; }
.theme-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--border); border-radius: 28px; transition: 0.3s; }
.theme-slider::before { content: ""; position: absolute; height: 22px; width: 22px; left: 3px; bottom: 3px; background: var(--text); border-radius: 50%; transition: 0.3s; }
.theme-switch input:checked + .theme-slider { background: var(--hover); }
.theme-switch input:checked + .theme-slider::before { transform: translateX(22px); }

.hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; background: none; border: none; cursor: pointer; padding: 8px; width: 40px; height: 40px; }
.hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.25s; transform-origin: center; }
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

@media (max-width: 768px) {
  .hamburger { display: flex; }
  .main-nav { display: none; flex-direction: column; position: absolute; top: 60px; left: 14px; right: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 0.5rem; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .main-nav.open { display: flex; }
  .main-nav a { border-radius: 8px; padding: 0.65rem 1rem; }
}

@media (max-width: 1000px) {
  header img { width: 120px; }
}

main {
  padding: 1rem;
}

.page-shell {
  display: grid;
  grid-template-columns: minmax(220px, 300px) 1fr;
  gap: 1rem;
  align-items: start;
}

.filters,
.results-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 14px 35px rgba(0,0,0,0.12);
}

.filters {
  position: sticky;
  top: 1rem;
  padding: 1rem;
  display: grid;
  gap: 0.85rem;
}

.filters h1 {
  margin: 0;
  font-size: 1.35rem;
}

.field {
  display: grid;
  gap: 0.35rem;
}

.field label {
  font-size: 0.82rem;
  opacity: 0.76;
}

input,
select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.7rem 0.75rem;
  background: rgba(255,255,255,0.08);
  color: var(--text);
  font: inherit;
}

option {
  color: #111827;
}

.check-row {
  display: flex;
  gap: 0.45rem;
  align-items: center;
  font-size: 0.95rem;
}

.check-row input {
  width: 1rem;
  height: 1rem;
  accent-color: var(--active);
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
}

.stat {
  padding: 0.65rem;
  border-radius: 12px;
  background: rgba(255,255,255,0.07);
}

.stat strong {
  display: block;
  font-size: 1.2rem;
}

.stat span {
  font-size: 0.78rem;
  opacity: 0.72;
}

.results-panel {
  overflow: hidden;
}

.results-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 1rem;
  border-bottom: 1px solid var(--border);
}

.results-head h2 {
  margin: 0;
  font-size: 1.1rem;
}

.operator-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 0.8rem;
  padding: 1rem;
  align-items: stretch;
}

.operator-card {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  min-height: 220px;
  height: 100%;
  padding: 0.9rem;
  border: 1px solid var(--border);
  border-radius: 14px;
  background: rgba(255,255,255,0.07);
}

.operator-card.highlighted {
  border-color: var(--hover);
  box-shadow: 0 0 0 2px var(--hover);
  background: rgba(96,165,250,0.15);
}

.operator-card .clear-highlight {
  display: none;
}

.operator-card.highlighted .clear-highlight {
  display: inline-flex;
}

.actions {
  margin-top: auto;
}

.operator-description {
  flex: 1;
}

:root.light .operator-card {
  background: rgba(15,23,42,0.04);
}

.operator-top {
  display: grid;
  grid-template-columns: 44px 1fr;
  gap: 0.75rem;
  align-items: center;
}

.operator-logo {
  width: 44px;
  height: 44px;
  object-fit: contain;
  border-radius: 10px;
  background: rgba(255,255,255,0.12);
}

.operator-name {
  font-weight: 800;
}

.operator-label {
  margin-top: 0.15rem;
  opacity: 0.76;
  font-size: 0.88rem;
}

.operator-description {
  margin: 0;
  line-height: 1.45;
  opacity: 0.86;
  font-size: 0.92rem;
}

.pills {
  display: flex;
  gap: 0.35rem;
  flex-wrap: wrap;
  align-items: flex-start;
  align-self: start;
}

.pill {
  flex: 0 1 auto;
  width: max-content;
  max-width: 100%;
  border-radius: 999px;
  padding: 0.22rem 0.5rem;
  background: rgba(255,255,255,0.08);
  font-size: 0.82rem;
}

.actions {
  display: flex;
  gap: 0.45rem;
  flex-wrap: wrap;
  align-items: flex-start;
  align-self: start;
}

.action-link {
  flex: 0 0 auto;
  color: var(--text);
  text-decoration: none;
  padding: 0.5rem 0.65rem;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  font-size: 0.9rem;
}

.action-link.primary {
  background: var(--active);
}

.empty {
  padding: 2rem;
  opacity: 0.76;
}

@media (max-width: 900px) {
  .page-shell {
    grid-template-columns: 1fr;
  }
  .filters {
    position: static;
  }
  .operator-grid {
    grid-template-columns: 1fr;
  }
}

/* ── Footer ── */
.site-footer {
  text-align: center;
  padding: 1.5rem 1rem 2rem;
  border-top: 1px solid var(--border);
  margin-top: 2rem;
  opacity: 0.85;
}
.footer-link {
  color: var(--hover);
  text-decoration: none;
  cursor: pointer;
  font-size: 0.95rem;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
}
.footer-link:hover { text-decoration: underline; opacity: 1; }
.footer-theme { display: flex; align-items: center; justify-content: center; gap: 0.65rem; margin-bottom: 0.85rem; }
.footer-theme-label { font-size: 0.85rem; color: var(--text-secondary); user-select: none; }

.mobile-only { display: none; }
@media (max-width: 768px) {
  header, .hamburger, .main-nav { display: none !important; }
  .mobile-only { display: inline; }
  .desktop-only { display: none; }
  .site-footer { display: none; }
}

</style>
</head>
<body>

<header>
  <a href="/"><img id="logo" src="trackandtide logo full.png" alt="Track & Tide" /></a>
  <button class="hamburger" id="hamburgerBtn" aria-label="Menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <nav class="main-nav" aria-label="Main navigation" id="mainNav">
    <a href="/">Map</a>
    <a href="/explore" class="active">Explore</a>
    <a href="/journey">Journey</a>
    <a href="/about" class="desktop-only">About</a>
    <a href="/more" class="mobile-only">More</a>
  </nav>
</header>

<main>
  <div class="page-shell">
    <aside class="filters">
      <h1>Operators</h1>
      <div class="field">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="search" placeholder="Name, description, country" />
      </div>
      <div class="field">
        <label for="countryFilter">Country served</label>
        <select id="countryFilter"></select>
      </div>
      <div class="field">
        <label for="typeFilter">Type</label>
        <select id="typeFilter">
          <option value="">All types</option>
          <option value="trains">Trains</option>
          <option value="ferries">Ferries</option>
        </select>
      </div>
      <label class="check-row"><input id="websiteFilter" type="checkbox" /> Has website</label>
      <label class="check-row"><input id="appFilter" type="checkbox" /> Has app link</label>
      <div class="field">
        <label for="sortFilter">Sort</label>
        <select id="sortFilter">
          <option value="name">Name</option>
          <option value="country">Primary country</option>
          <option value="type">Type</option>
        </select>
      </div>
      <div class="stats">
        <div class="stat"><strong id="totalStat">0</strong><span>Total</span></div>
        <div class="stat"><strong id="trainStat">0</strong><span>Train</span></div>
        <div class="stat"><strong id="ferryStat">0</strong><span>Ferry</span></div>
      </div>
    </aside>

    <section class="results-panel">
      <div class="results-head">
        <h2 id="resultTitle">Operators</h2>
        <span id="countryCount"></span>
      </div>
      <div class="operator-grid" id="operatorGrid"></div>
    </section>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-theme">
    <span class="footer-theme-label" id="themeLabel">Light mode</span>
    <label class="theme-switch" title="Toggle dark/light mode">
      <input type="checkbox" id="themeToggle" />
      <span class="theme-slider"></span>
    </label>
  </div>
  <a class="footer-link" onclick="openReportModal()">Report ideas or bugs / misinformation</a>
</footer>

<script>
const root = document.documentElement;
const toggle = document.getElementById("themeToggle");
const logo = document.getElementById("logo");
const searchInput = document.getElementById("searchInput");
const countryFilter = document.getElementById("countryFilter");
const typeFilter = document.getElementById("typeFilter");
const websiteFilter = document.getElementById("websiteFilter");
const appFilter = document.getElementById("appFilter");
const sortFilter = document.getElementById("sortFilter");
const operatorGrid = document.getElementById("operatorGrid");
const resultTitle = document.getElementById("resultTitle");
const countryCount = document.getElementById("countryCount");
const totalStat = document.getElementById("totalStat");
const trainStat = document.getElementById("trainStat");
const ferryStat = document.getElementById("ferryStat");
let operators = [];

function setTheme(mode) {
  if (mode === "light") root.classList.add("light");
  else root.classList.remove("light");
  localStorage.setItem("trackandtide:theme", mode);
  toggle.checked = (mode === "light");
  const themeLabel = document.getElementById("themeLabel");
  if (themeLabel) themeLabel.textContent = mode === "light" ? "Light mode" : "Dark mode";
  logo.src = mode === "light" ? "trackandtide logo full.png" : "logo full light.png";
}

function detectTheme() {
  const savedTheme = localStorage.getItem("trackandtide:theme");
  if (savedTheme) return savedTheme;
  return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
}

toggle.addEventListener('change', () => setTheme(toggle.checked ? "light" : "dark"));
setTheme(detectTheme());

// Hamburger menu
const hamburgerBtn = document.getElementById("hamburgerBtn");
const mainNav = document.getElementById("mainNav");

hamburgerBtn.addEventListener("click", () => {
  const open = !mainNav.classList.contains("open");
  mainNav.classList.toggle("open", open);
  hamburgerBtn.classList.toggle("open", open);
  hamburgerBtn.setAttribute("aria-expanded", open);
});

mainNav.querySelectorAll('a').forEach(link => {
  link.addEventListener('click', () => {
    mainNav.classList.remove("open");
    hamburgerBtn.classList.remove("open");
    hamburgerBtn.setAttribute("aria-expanded", "false");
  });
});

function escapeHTML(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}
function unique(values) {
  return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b));
}

function operatorCountries(operator) {
  return operator.countries || [operator.country].filter(Boolean);
}

function hasApp(operator) {
  return Boolean(operator.appLinks?.android || operator.appLinks?.ios);
}

function buildFilters() {
  const countries = unique(operators.flatMap(operatorCountries));
  countryFilter.innerHTML = `<option value="">All countries</option>${countries.map(country => `<option>${escapeHTML(country)}</option>`).join("")}`;
}

function getFilteredOperators() {
  const rawQuery = searchInput.value.trim();
  const query = normalizeForSearch(rawQuery);
  const country = countryFilter.value;
  const type = typeFilter.value;

  return operators
    .filter(operator => {
      const countries = operatorCountries(operator);
      const haystack = normalizeForSearch([
        operator.name,
        operator.operatorLabel,
        operator.description,
        operator.type,
        ...countries
      ].join(" "));

      return (!rawQuery || (haystack.indexOf(query) !== -1 || fuzzyMatchScore(query, normalizeForSearch(operator.name)) > 30)) &&
        (!country || countries.includes(country)) &&
        (!type || operator.type === type) &&
        (!websiteFilter.checked || Boolean(operator.website)) &&
        (!appFilter.checked || hasApp(operator));
    })
    .sort((a, b) => {
      if (sortFilter.value === "country") return (a.country || "").localeCompare(b.country || "") || a.name.localeCompare(b.name);
      if (sortFilter.value === "type") return (a.type || "").localeCompare(b.type || "") || a.name.localeCompare(b.name);
      return a.name.localeCompare(b.name);
    });
}

function render() {
  const filtered = getFilteredOperators();
  const trainCount = filtered.filter(operator => operator.type === "trains").length;
  const ferryCount = filtered.filter(operator => operator.type === "ferries").length;
  const servedCountries = unique(filtered.flatMap(operatorCountries));

  totalStat.textContent = filtered.length.toLocaleString();
  trainStat.textContent = trainCount.toLocaleString();
  ferryStat.textContent = ferryCount.toLocaleString();
  resultTitle.textContent = `${filtered.length.toLocaleString()} operators`;
  countryCount.textContent = `${servedCountries.length.toLocaleString()} countries served`;

  operatorGrid.innerHTML = filtered.length ? filtered.map(operator => {
    const countries = operatorCountries(operator);
    const visibleCountries = countries.slice(0, 6);
    return `
      <article class="operator-card" data-operator-name="${escapeHTML(operator.name)}">
        <div class="operator-top">
          ${operator.logo ? `<img class="operator-logo" src="operator logos/${escapeHTML(operator.logo)}" alt="${escapeHTML(operator.name)} logo" />` : `<div class="operator-logo"></div>`}
          <div>
            <div class="operator-name">${escapeHTML(operator.name)}</div>
            <div class="operator-label">${escapeHTML(operator.operatorLabel || (operator.type === "trains" ? "Train operator" : "Ferry operator"))}</div>
          </div>
        </div>
        ${operator.description ? `<p class="operator-description">${escapeHTML(operator.description)}</p>` : ""}
        <div class="pills">
          <span class="pill">${operator.type === "trains" ? "Trains" : "Ferries"}</span>
          ${visibleCountries.map(country => `<span class="pill">${escapeHTML(country)}</span>`).join("")}
          ${countries.length > visibleCountries.length ? `<span class="pill">+${countries.length - visibleCountries.length}</span>` : ""}
        </div>
        <div class="actions">
          ${operator.website ? `<a class="action-link primary" href="${escapeHTML(operator.website)}" target="_blank" rel="noopener">Website</a>` : ""}
          ${operator.appLinks?.android ? `<a class="action-link" href="${escapeHTML(operator.appLinks.android)}" target="_blank" rel="noopener">Android</a>` : ""}
          ${operator.appLinks?.ios ? `<a class="action-link" href="${escapeHTML(operator.appLinks.ios)}" target="_blank" rel="noopener">iOS</a>` : ""}
          <a class="action-link clear-highlight" href="/operators">Clear highlight</a>
        </div>
      </article>
    `;
  }).join("") : `<div class="empty">No operators match these filters.</div>`;
}

fetch("./data.json?v=20260603")
  .then(response => response.json())
  .then(data => {
    operators = data.operators || [];
    buildFilters();
    render();

    // Check if an operator was specified in the URL
    const operatorParam = new URLSearchParams(window.location.search).get("operator");
    if (operatorParam) {
      const normalizedParam = normalizeForSearch(operatorParam);
      const match = operators.find(op => normalizeForSearch(op.name) === normalizedParam);
      if (match) {
        searchInput.value = match.name;
        render();
        // Highlight the matching card
        requestAnimationFrame(() => {
          const cards = operatorGrid.querySelectorAll('.operator-card');
          for (const card of cards) {
            if (card.dataset.operatorName === match.name) {
              card.classList.add('highlighted');
              card.scrollIntoView({ block: 'center', behavior: 'smooth' });
              break;
            }
          }
        });
      }
    }
  });

[searchInput, countryFilter, typeFilter, websiteFilter, appFilter, sortFilter].forEach(control => {
  control.addEventListener("input", render);
  control.addEventListener("change", render);
});
</script>

<script src="report-modal.js"></script>
<script src="bottom-nav.js"></script>
<script src="search-utils.js"></script>

</body>
</html>
