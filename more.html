<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>More — Track & Tide</title>
  <meta name="description" content="Settings and links for Track & Tide." />
  <meta property="og:title" content="More — Track & Tide" />
  <meta property="og:description" content="Settings and links for Track & Tide." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://trackandtide.com/more" />
  <meta property="og:image" content="https://trackandtide.com/trackandtide%20logo%20full.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Track & Tide — More" />
  <meta property="og:locale" content="en_GB" />
  <meta property="og:site_name" content="Track & Tide" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="More — Track & Tide" />
  <meta name="twitter:description" content="Settings and links for Track & Tide." />
  <meta name="twitter:image" content="https://trackandtide.com/trackandtide%20logo%20full.png" />
  <link rel="canonical" href="https://trackandtide.com/more" />
  <link rel="icon" href="icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1F2937" />

  <style>
    :root {
      --bg: #1F2937;
      --panel: #1F2937;
      --card: #273549;
      --text: #F8FAFC;
      --text-secondary: #94A3B8;
      --border: rgba(255,255,255,0.08);
      --hover: #60A5FA;
      --active: #3B82F6;
    }

    :root.light {
      --bg: #d5d9e2;
      --panel: #ffffff;
      --card: #f8fafc;
      --text: #111827;
      --text-secondary: #6B7280;
      --border: rgba(15,23,42,0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh; font-family: system-ui;
      background: var(--bg); color: var(--text);
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; row-gap: 0.5rem; padding: 8px 20px;
      border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    header img { width: 200px; }
    @media (max-width: 1000px) { header img { width: 120px; } }

    .main-nav {
      display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: center;
    }
    .main-nav a {
      color: var(--text); text-decoration: none; padding: 0.55rem 0.75rem;
      border-radius: 999px; opacity: 0.78; border: 1px solid transparent;
    }
    .main-nav a:hover, .main-nav a.active { opacity: 1; background: var(--card); border-color: var(--border); }

    .hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; background: none; border: none; cursor: pointer; padding: 8px; width: 40px; height: 40px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.25s; transform-origin: center; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .main-nav { display: none; flex-direction: column; position: absolute; top: 60px; left: 14px; right: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 0.5rem; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
      .main-nav.open { display: flex; }
      .main-nav a { border-radius: 8px; padding: 0.65rem 1rem; }
    }

    .container {
      max-width: 600px; margin: 0 auto; padding: 1.5rem 1rem;
    }

    h1 {
      margin: 0 0 1.5rem; font-size: 1.5rem;
    }

    .menu-list {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .menu-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem; gap: 0.75rem;
      cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .menu-item + .menu-item { border-top: 1px solid var(--border); }

    a.menu-item { color: var(--text); text-decoration: none; }
    a.menu-item:hover, .menu-item.clickable:hover { background: rgba(96,165,250,0.06); }

    .menu-item-icon { font-size: 1.25rem; flex-shrink: 0; opacity: 0.7; width: 1.5rem; text-align: center; }
    .menu-item-label { flex: 1; font-size: 0.95rem; font-weight: 600; }
    .menu-item-sub { font-size: 0.78rem; opacity: 0.5; font-weight: 400; }
    .menu-item-arrow { opacity: 0.3; font-size: 0.9rem; flex-shrink: 0; }

    /* theme switch inline */
    .theme-switch { position: relative; display: inline-flex; align-items: center; width: 50px; height: 28px; flex-shrink: 0; }
    .theme-switch input { opacity: 0; width: 0; height: 0; }
    .theme-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--border); border-radius: 28px; transition: 0.3s; }
    .theme-slider::before { content: ""; position: absolute; height: 22px; width: 22px; left: 3px; bottom: 3px; background: var(--text); border-radius: 50%; transition: 0.3s; }
    .theme-switch input:checked + .theme-slider { background: var(--hover); }
    .theme-switch input:checked + .theme-slider::before { transform: translateX(22px); }

    .site-footer { text-align: center; padding: 1.5rem 1rem 2rem; opacity: 0.6; }

    .mobile-only { display: none; }
    @media (max-width: 768px) {
      .mobile-only { display: inline; }
      .desktop-only { display: none; }
      .site-footer { display: none; }
    }

  </style>
</head>
<body>

  <header>
    <a href="/"><img id="logo" src="trackandtide logo full.png" alt="Track & Tide" /></a>
    <button class="hamburger" id="hamburgerBtn" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="main-nav" aria-label="Main navigation" id="mainNav">
      <a href="/">Map</a>
      <a href="/explore">Explore</a>
      <a href="/journey">Journey</a>
      <a href="/about" class="desktop-only">About</a>
      <a href="/more" class="active">More</a>
    </nav>
  </header>

  <div class="container">
    <h1>More</h1>

    <div class="menu-list">

      <!-- Theme toggle -->
      <div class="menu-item clickable" id="themeRow">
        <span class="menu-item-icon">&#9788;</span>
        <span class="menu-item-label">Light mode</span>
        <label class="theme-switch" title="Toggle dark/light mode" onclick="event.stopPropagation()">
          <input type="checkbox" id="themeToggle" />
          <span class="theme-slider"></span>
        </label>
      </div>

      <!-- Install webapp -->
      <div class="menu-item clickable" id="installRow" style="display:none" onclick="installWebApp()">
        <span class="menu-item-icon">&#8681;</span>
        <span class="menu-item-label">Add to home screen<span class="menu-item-sub"> — Install as an app</span></span>
        <span class="menu-item-arrow">&#8250;</span>
      </div>

      <!-- Report -->
      <a class="menu-item" onclick="openReportModal()">
        <span class="menu-item-icon">&#9998;</span>
        <span class="menu-item-label">Report a bug or idea<span class="menu-item-sub"> — Send feedback</span></span>
        <span class="menu-item-arrow">&#8250;</span>
      </a>

      <!-- About -->
      <a class="menu-item" href="/about">
        <span class="menu-item-icon">&#8505;</span>
        <span class="menu-item-label">About Track &amp; Tide<span class="menu-item-sub"> — Learn more about the project</span></span>
        <span class="menu-item-arrow">&#8250;</span>
      </a>

    </div>
  </div>

  <footer class="site-footer">
    <span>Track &amp; Tide</span>
  </footer>

  <script src="report-modal.js"></script>
  <script src="bottom-nav.js"></script>

  <script>
    const root = document.documentElement;
    const themeToggle = document.getElementById("themeToggle");
    const logo = document.getElementById("logo");

    function setTheme(mode) {
      if (mode === "light") root.classList.add("light");
      else root.classList.remove("light");
      localStorage.setItem("trackandtide:theme", mode);
      themeToggle.checked = (mode === "light");
      const label = document.querySelector("#themeRow .menu-item-label");
      if (label) label.textContent = mode === "light" ? "Light mode" : "Dark mode";
      logo.src = mode === "light" ? "trackandtide logo full.png" : "logo full light.png";
    }

    function detectTheme() {
      const saved = localStorage.getItem("trackandtide:theme");
      if (saved) return saved;
      return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }

    themeToggle.addEventListener("change", () => setTheme(themeToggle.checked ? "light" : "dark"));
    setTheme(detectTheme());

    // Hamburger
    const hamburgerBtn = document.getElementById("hamburgerBtn");
    const mainNav = document.getElementById("mainNav");
    hamburgerBtn.addEventListener("click", () => {
      const open = !mainNav.classList.contains("open");
      mainNav.classList.toggle("open", open);
      hamburgerBtn.classList.toggle("open", open);
      hamburgerBtn.setAttribute("aria-expanded", open);
    });
    mainNav.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", () => {
        mainNav.classList.remove("open");
        hamburgerBtn.classList.remove("open");
        hamburgerBtn.setAttribute("aria-expanded", "false");
      });
    });

    // Make the whole theme row clickable
    document.getElementById("themeRow").addEventListener("click", () => {
      themeToggle.checked = !themeToggle.checked;
      setTheme(themeToggle.checked ? "light" : "dark");
    });

    // ── PWA Install ──
    let installPrompt = null;
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      installPrompt = e;
      document.getElementById("installRow").style.display = "";
    });
    function installWebApp() {
      if (!installPrompt) return;
      installPrompt.prompt();
      installPrompt.userChoice.then((result) => {
        if (result.outcome === "accepted") {
          document.getElementById("installRow").style.display = "none";
        }
      });
    }
    // Also hide if app is already running in standalone mode
    if (window.matchMedia("(display-mode: standalone)").matches) {
      document.getElementById("installRow").style.display = "none";
    }
  </script>

</body>
</html>
