<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Lost Track</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #eef8fb;
      --primary: #5f8797;
      --secondary: #7fd1f0;
      --dark: #294552;
      --white: #ffffff;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: "Outfit", sans-serif;
      background:
        radial-gradient(circle at top left, #d8f3fb 0%, transparent 35%),
        radial-gradient(circle at bottom right, #c4ecf7 0%, transparent 35%),
        var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--dark);
      position: relative;
    }

    .waves {
      position: absolute;
      bottom: -20px;
      left: 0;
      width: 100%;
      opacity: 0.18;
      animation: floatWaves 8s ease-in-out infinite;
    }

    @keyframes floatWaves {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .container {
      text-align: center;
      max-width: 950px;
      padding: 40px;
      position: relative;
      z-index: 2;
    }

    .badge {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(95, 135, 151, 0.12);
      color: var(--primary);
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 30px;
      border: 1px solid rgba(95,135,151,0.18);
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: clamp(5rem, 12vw, 10rem);
      line-height: 0.9;
      font-weight: 900;
      color: var(--primary);
      position: relative;
    }

    .track {
      width: 420px;
      max-width: 90%;
      height: 140px;
      margin: 20px auto 10px;
      position: relative;
      transform: rotate(-8deg);
    }

    .rail {
      position: absolute;
      width: 100%;
      height: 12px;
      background: var(--primary);
      border-radius: 999px;
    }

    .rail.top {
      top: 35px;
    }

    .rail.bottom {
      bottom: 35px;
    }

    .ties {
      position: absolute;
      top: 24px;
      width: 100%;
      height: 90px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
    }

    .ties span {
      width: 12px;
      height: 70px;
      background: rgba(95, 135, 151, 0.5);
      border-radius: 6px;
    }

    .train {
      position: absolute;
      top: 10px;
      left: 0;
      width: 90px;
      height: 60px;
      border-radius: 18px 18px 12px 12px;
      background: linear-gradient(135deg, var(--secondary), #58b7da);
      box-shadow: 0 12px 24px rgba(0,0,0,0.12);
      animation: runaway 6s ease-in-out infinite;
    }

    .train::before,
    .train::after {
      content: "";
      position: absolute;
      bottom: -12px;
      width: 16px;
      height: 16px;
      background: var(--dark);
      border-radius: 50%;
    }

    .train::before {
      left: 14px;
    }

    .train::after {
      right: 14px;
    }

    .window {
      position: absolute;
      top: 14px;
      width: 18px;
      height: 18px;
      background: rgba(255,255,255,0.85);
      border-radius: 4px;
    }

    .w1 { left: 14px; }
    .w2 { left: 38px; }
    .w3 { left: 62px; }

    @keyframes runaway {
      0% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(320px) rotate(2deg);
      }
      100% {
        transform: translateX(0);
      }
    }

    h2 {
      font-size: clamp(2rem, 4vw, 3rem);
      margin-top: 10px;
      margin-bottom: 16px;
      font-weight: 800;
    }

    p {
      font-size: 1.15rem;
      line-height: 1.7;
      max-width: 700px;
      margin: 0 auto;
      color: rgba(41,69,82,0.85);
    }

    .buttons {
      margin-top: 38px;
      display: flex;
      gap: 18px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 28px;
      border-radius: 18px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.25s ease;
      font-size: 1rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #7399a7);
      color: white;
      box-shadow: 0 12px 24px rgba(95,135,151,0.25);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 30px rgba(95,135,151,0.35);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(95,135,151,0.15);
      color: var(--primary);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      transform: translateY(-3px);
      background: white;
    }

    .floating {
      position: absolute;
      border-radius: 50%;
      background: rgba(127,209,240,0.25);
      animation: bubble 12s linear infinite;
    }

    .f1 {
      width: 120px;
      height: 120px;
      top: 12%;
      left: 8%;
    }

    .f2 {
      width: 80px;
      height: 80px;
      bottom: 18%;
      right: 10%;
      animation-delay: 3s;
    }

    .f3 {
      width: 50px;
      height: 50px;
      top: 20%;
      right: 20%;
      animation-delay: 6s;
    }

    @keyframes bubble {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-25px); }
    }

    @media (max-width: 768px) {
      .container {
        padding: 24px;
      }

      .track {
        height: 120px;
      }

      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="floating f1"></div>
  <div class="floating f2"></div>
  <div class="floating f3"></div>

  <svg class="waves" viewBox="0 0 1440 320">
    <path fill="#7fd1f0" fill-opacity="1"
      d="M0,192L80,202.7C160,213,320,235,480,224C640,213,800,171,960,170.7C1120,171,1280,213,1360,234.7L1440,256L1440,320L0,320Z">
    </path>
  </svg>

  <div class="container">

    <div class="badge">Route Not Found</div>

    <h1>404</h1>

    <div class="track">
      <div class="rail top"></div>
      <div class="rail bottom"></div>

      <div class="ties">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>

      <div class="train">
        <div class="window w1"></div>
        <div class="window w2"></div>
        <div class="window w3"></div>
      </div>
    </div>

    <h2>Oops… lost track...</h2>

    <p>
      Looks like this route derailed somewhere between the station and the ferry dock.
      The page you’re looking for may have departed, drifted away, or never existed in the first place.
    </p>

    <div class="buttons">
      <a href="/" class="btn btn-primary">Back to Home</a>
      <a href="/routes" class="btn btn-secondary">Browse Routes</a>
    </div>

  </div>

</body>
</html>
