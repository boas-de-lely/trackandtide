<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stations - Track & Tide</title>
<link rel="icon" href="icon.png" />
<style>
:root {
  --bg: #1f2937;
  --panel: rgba(31,41,55,0.75);
  --text: #ffffff;
  --border: rgba(255,255,255,0.08);
  --hover: #60a5fa;
  --active: #3b82f6;
}

:root.light {
  --bg: #d5d9e2;
  --panel: #f8fafc;
  --text: #111827;
  --border: rgba(15,23,42,0.16);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: system-ui;
  background: var(--bg);
  color: var(--text);
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 14px 20px;
}

header img {
  width: 200px;
}

.main-nav {
  display: flex;
  gap: 0.35rem;
  flex-wrap: wrap;
  justify-content: center;
}

.main-nav a,
.toggle {
  color: var(--text);
  text-decoration: none;
  padding: 0.55rem 0.75rem;
  border-radius: 999px;
  opacity: 0.8;
  border: 1px solid transparent;
}

.main-nav a:hover,
.main-nav a.active,
.toggle {
  opacity: 1;
  background: var(--panel);
  border-color: var(--border);
}

.toggle {
  cursor: pointer;
}

main {
  padding: 1rem;
}

.page-shell {
  display: grid;
  grid-template-columns: minmax(220px, 300px) 1fr;
  gap: 1rem;
  align-items: start;
}

.filters,
.results-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 14px 35px rgba(0,0,0,0.12);
}

.filters {
  position: sticky;
  top: 1rem;
  padding: 1rem;
  display: grid;
  gap: 0.85rem;
}

.filters h1 {
  margin: 0;
  font-size: 1.35rem;
}

.field {
  display: grid;
  gap: 0.35rem;
}

.field label {
  font-size: 0.82rem;
  opacity: 0.76;
}

input,
select {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.7rem 0.75rem;
  background: rgba(255,255,255,0.08);
  color: var(--text);
  font: inherit;
}

option {
  color: #111827;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.5rem;
}

.stat {
  padding: 0.65rem;
  border-radius: 12px;
  background: rgba(255,255,255,0.07);
}

.stat strong {
  display: block;
  font-size: 1.2rem;
}

.stat span {
  font-size: 0.78rem;
  opacity: 0.72;
}

.results-panel {
  overflow: hidden;
}

.results-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  padding: 1rem;
  border-bottom: 1px solid var(--border);
}

.results-head h2 {
  margin: 0;
  font-size: 1.1rem;
}

.station-detail-panel {
  padding: 1rem;
  border-bottom: 1px solid var(--border);
}

.station-detail-card {
  display: grid;
  gap: 0.75rem;
}

.station-detail-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin: 0;
}

.station-detail-operators {
  color: var(--text);
  opacity: 0.85;
  margin: 0.5rem 0 0;
}

/* Inline fold-out detail */
.station-detail-inline {
  padding: 1rem 1rem 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  border-left: 4px solid var(--hover);
  background: rgba(96,165,250,0.08);
}

.station-detail-loading {
  opacity: 0.7;
}

.detail-header {
  display: grid;
  gap: 0.4rem;
}

.detail-header h3 {
  margin: 0;
  font-size: 1.05rem;
}

.detail-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}

/* Wikidata enrichment */
.detail-wiki {
  display: grid;
  gap: 0.5rem;
  margin-top: 0.5rem;
}

.detail-wiki-img {
  width: 100%;
  max-width: 300px;
  max-height: 180px;
  object-fit: cover;
  border-radius: 10px;
  border: 1px solid var(--border);
}

.detail-wiki-desc {
  margin: 0;
  font-size: 0.9rem;
  opacity: 0.82;
  line-height: 1.5;
}

.detail-wiki-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
  align-items: center;
}

/* Action links */
.detail-links {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 0.4rem;
}

.detail-link {
  color: var(--hover);
  font-weight: 600;
  text-decoration: none;
  font-size: 0.88rem;
  font-family: inherit;
  padding: 0.35rem 0.65rem;
  border-radius: 8px;
  border: 1px solid rgba(96,165,250,0.3);
  background: rgba(96,165,250,0.1);
  transition: background 0.2s;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
}

.detail-link:hover {
  background: rgba(96,165,250,0.22);
}

.detail-link-map {
  background: rgba(56,189,248,0.18);
  border-color: rgba(56,189,248,0.4);
}

:root.light .station-detail-inline {
  background: rgba(59,130,246,0.05);
}

:root.light .detail-link {
  border-color: rgba(59,130,246,0.25);
  background: rgba(59,130,246,0.08);
}

:root.light .detail-link-map {
  background: rgba(56,189,248,0.12);
  border-color: rgba(56,189,248,0.25);
}

.station-list {
  display: grid;
}

.station-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.75rem;
  padding: 0.9rem 1rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}

.station-row:hover {
  background: rgba(255,255,255,0.05);
}

.station-row.selected {
  background: rgba(96,165,250,0.12);
  border-left: 4px solid var(--hover);
}

.station-row:last-child {
  border-bottom: none;
}

.station-name {
  font-weight: 750;
}

.station-meta {
  margin-top: 0.25rem;
  display: flex;
  gap: 0.45rem;
  flex-wrap: wrap;
  color: var(--text);
  opacity: 0.76;
  font-size: 0.88rem;
}

.pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 0.22rem 0.5rem;
  background: rgba(255,255,255,0.08);
}

.source-wikidata {
  color: #34d399;
}

.source-osm {
  color: #fbbf24;
}

.source-link {
  color: var(--hover);
  font-weight: 700;
  text-decoration: none;
  white-space: nowrap;
}

.empty {
  padding: 2rem;
  opacity: 0.76;
}

@media (max-width: 900px) {
  header {
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .main-nav {
    order: 3;
    width: 100%;
    justify-content: flex-start;
  }
  .page-shell {
    grid-template-columns: 1fr;
  }
  .filters {
    position: static;
  }
  .stats {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
  .station-row {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<header>
  <img id="logo" src="trackandtide logo full.png" alt="Track & Tide" />
  <nav class="main-nav" aria-label="Main navigation">
    <a href="/">Map</a>
    <a href="/stations" class="active">Stations</a>
    <a href="/operators">Operators</a>
  </nav>
  <div class="toggle" id="themeToggle">Light mode</div>
</header>

<main>
  <div class="page-shell">
    <aside class="filters">
      <h1>Stations</h1>
      <div class="field">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="search" placeholder="Station, operator, country" />
      </div>
      <div class="field">
        <label for="countryFilter">Country</label>
        <select id="countryFilter"></select>
      </div>
      <div class="field">
        <label for="sourceFilter">Source</label>
        <select id="sourceFilter">
          <option value="">All sources</option>
          <option value="wikidata">Wikidata</option>
          <option value="osm">OpenStreetMap</option>
        </select>
      </div>
      <div class="field">
        <label for="operatorFilter">Operator</label>
        <select id="operatorFilter"></select>
      </div>
      <div class="field">
        <label for="sortFilter">Sort</label>
        <select id="sortFilter">
          <option value="name">Name</option>
          <option value="country">Country</option>
          <option value="source">Source</option>
        </select>
      </div>
      <div class="stats">
        <div class="stat"><strong id="totalStat">0</strong><span>Total</span></div>
        <div class="stat"><strong id="wikidataStat">0</strong><span>Wikidata</span></div>
        <div class="stat"><strong id="osmStat">0</strong><span>OSM</span></div>
      </div>
    </aside>

    <section class="results-panel">
      <div class="results-head">
        <h2 id="resultTitle">Stations</h2>
        <span id="generatedAt"></span>
      </div>
      <div class="station-list" id="stationList"></div>
    </section>
  </div>
</main>

<script>
const root = document.documentElement;
const toggle = document.getElementById("themeToggle");
const logo = document.getElementById("logo");
const searchInput = document.getElementById("searchInput");
const countryFilter = document.getElementById("countryFilter");
const sourceFilter = document.getElementById("sourceFilter");
const operatorFilter = document.getElementById("operatorFilter");
const sortFilter = document.getElementById("sortFilter");
const stationList = document.getElementById("stationList");
const resultTitle = document.getElementById("resultTitle");
const generatedAt = document.getElementById("generatedAt");
const totalStat = document.getElementById("totalStat");
const wikidataStat = document.getElementById("wikidataStat");
const osmStat = document.getElementById("osmStat");
let stations = [];
let selectedStationId = new URLSearchParams(window.location.search).get("stationId");

function setTheme(mode) {
  if (mode === "light") root.classList.add("light");
  else root.classList.remove("light");
  localStorage.setItem("trackandtide:theme", mode);
  toggle.textContent = root.classList.contains("light") ? "Dark mode" : "Light mode";
  logo.src = mode === "light" ? "trackandtide logo full.png" : "logo full light.png";
}

function detectTheme() {
  const savedTheme = localStorage.getItem("trackandtide:theme");
  if (savedTheme) return savedTheme;
  return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
}

toggle.onclick = () => setTheme(root.classList.contains("light") ? "dark" : "light");
setTheme(detectTheme());

function escapeHTML(text) {
  return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function getStationById(stationId) {
  return stations.find(station => station.id === stationId) || null;
}

// Wikidata cache
const wikiCache = {};

async function fetchWikidataInfo(wikidataId) {
  if (!wikidataId) return null;
  if (wikiCache[wikidataId]) return wikiCache[wikidataId];

  try {
    const url = `https://www.wikidata.org/wiki/Special:EntityData/${encodeURIComponent(wikidataId)}.json`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('Wikidata fetch failed');
    const data = await resp.json();
    const entity = data.entities?.[wikidataId];
    if (!entity) throw new Error('Entity not found');

    const result = {};

    // Image (P18)
    const imageFile = entity.claims?.P18?.[0]?.mainsnak?.datavalue?.value;
    if (imageFile) {
      const filename = encodeURIComponent(imageFile.replace(/ /g, '_'));
      result.image = `https://commons.wikimedia.org/wiki/Special:FilePath/${filename}?width=300`;
    }

    // Description in English or any language
    const desc = entity.descriptions?.en?.value || Object.values(entity.descriptions || {})[0]?.value;
    if (desc) result.description = desc;

    // Inception date (P571)
    const inception = entity.claims?.P571?.[0]?.mainsnak?.datavalue?.value?.time;
    if (inception) {
      const d = inception.replace(/^\+/, '').split('T')[0];
      if (d && d !== '0000-00-00') result.inception = d;
    }

    // Official website (P856)
    const website = entity.claims?.P856?.[0]?.mainsnak?.datavalue?.value;
    if (website) result.website = website;

    wikiCache[wikidataId] = result;
    return result;
  } catch (e) {
    wikiCache[wikidataId] = null;
    return null;
  }
}

function renderStationDetailHTML(station, wikiData) {
  if (!station) return "";

  const sourceLabel = station.source === "osm" ? "OpenStreetMap" : "Wikidata";
  const sourceUrl = escapeHTML(station.url || station.id || "https://www.openstreetmap.org");

  let wikiBlock = "";
  if (wikiData) {
    wikiBlock = `
      <div class="detail-wiki">
        ${wikiData.image ? `<img class="detail-wiki-img" src="${escapeHTML(wikiData.image)}" alt="${escapeHTML(station.name)}" loading="lazy" />` : ""}
        ${wikiData.description ? `<p class="detail-wiki-desc">${escapeHTML(wikiData.description)}</p>` : ""}
        <div class="detail-wiki-meta">
          ${wikiData.inception ? `<span><span class="detail-label">Opened</span> ${escapeHTML(wikiData.inception)}</span>` : ""}
          ${wikiData.website ? `<a class="detail-link" href="${escapeHTML(wikiData.website)}" target="_blank" rel="noopener">Website</a>` : ""}
        </div>
      </div>`;
  }

  return `
    <div class="station-detail-inline" data-station-detail="${escapeHTML(station.id)}">
      <div class="detail-header">
        <h3>${escapeHTML(station.name)}</h3>
        <div class="detail-pills">
          <span class="pill">${escapeHTML(station.country)}</span>
          <span class="pill ${station.source === "osm" ? "source-osm" : "source-wikidata"}">${escapeHTML(sourceLabel)}</span>
          ${(station.operators || []).slice(0, 3).map(op => `<span class="pill">${escapeHTML(op)}</span>`).join("")}
        </div>
      </div>
      ${wikiBlock}
      <div class="detail-links">
        <a class="detail-link" href="${sourceUrl}" target="_blank" rel="noopener">${sourceLabel} source</a>
        ${station.wikidataId ? `<a class="detail-link" href="https://www.wikidata.org/wiki/${escapeHTML(station.wikidataId)}" target="_blank" rel="noopener">Wikidata</a>` : ""}
        <button class="detail-link detail-link-map" data-open-map="${escapeHTML(station.id)}">🗺 Open on map</button>
      </div>
    </div>
  `;
}

function removeInlineDetail() {
  const existing = stationList.querySelector('.station-detail-inline');
  if (existing) existing.remove();
}

async function showInlineDetail(stationId) {
  removeInlineDetail();
  const station = getStationById(stationId);
  if (!station) return;

  const row = stationList.querySelector(`.station-row[data-station-id="${CSS.escape(stationId)}"]`);
  if (!row) return;

  // Show a loading placeholder
  const loadingHTML = `<div class="station-detail-inline station-detail-loading" data-station-detail="${escapeHTML(stationId)}"><div class="detail-header"><h3>${escapeHTML(station.name)}</h3></div><p style="opacity:0.6;margin:0;">Loading Wikidata info…</p></div>`;
  row.insertAdjacentHTML('afterend', loadingHTML);

  // Fetch Wikidata data in the background
  let wikiData = null;
  if (station.wikidataId || station.source === "wikidata") {
    const wdId = station.wikidataId || station.id;
    wikiData = await fetchWikidataInfo(wdId);
  }

  // Replace loading placeholder with full detail
  removeInlineDetail();
  const html = renderStationDetailHTML(station, wikiData);
  row.insertAdjacentHTML('afterend', html);
}

function highlightStationRow(stationId) {
  stationList.querySelectorAll('.station-row').forEach(row => {
    row.classList.toggle('selected', row.dataset.stationId === stationId);
  });
}

function openStationOnMap(stationId) {
  if (!stationId) return;
  window.location.href = `/index?stationId=${encodeURIComponent(stationId)}`;
}

stationList.addEventListener('click', event => {
  // Handle "Open on map" button — use JS navigation to guarantee query string survives
  const openMapBtn = event.target.closest('[data-open-map]');
  if (openMapBtn) {
    event.preventDefault();
    const stationId = openMapBtn.dataset.openMap;
    if (stationId) {
      window.location.href = `/index?stationId=${encodeURIComponent(stationId)}`;
    }
    return;
  }

  // Allow clicks on other links to work normally
  if (event.target.closest('a')) return;

  const row = event.target.closest('.station-row');
  if (!row) return;
  const stationId = row.dataset.stationId;
  if (!stationId) return;

  // Toggle: if already selected, deselect
  if (selectedStationId === stationId) {
    selectedStationId = null;
    highlightStationRow(null);
    removeInlineDetail();
    const url = new URL(window.location);
    url.searchParams.delete('stationId');
    window.history.replaceState({}, '', url);
    return;
  }

  // Select new station
  selectedStationId = stationId;
  highlightStationRow(stationId);
  showInlineDetail(stationId);

  // Update URL without navigating
  const url = new URL(window.location);
  url.searchParams.set('stationId', stationId);
  window.history.replaceState({}, '', url);
});

function restoreSelectedStation() {
  if (!selectedStationId) return;
  const station = getStationById(selectedStationId);
  if (!station) {
    selectedStationId = null;
    return;
  }
  // Pre-fill search with station name so only this station is visible
  searchInput.value = station.name;
  countryFilter.value = "";
  sourceFilter.value = "";
  operatorFilter.value = "";
  updateOperatorFilter();
  renderAndRestoreDetail();
  // Scroll to the selected row
  requestAnimationFrame(() => {
    const selectedRow = stationList.querySelector('.station-row.selected');
    if (selectedRow) selectedRow.scrollIntoView({ block: 'center', behavior: 'smooth' });
  });
}

function unique(values) {
  return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b));
}

function stationSourceLabel(source) {
  return source === "osm" ? "OpenStreetMap" : "Wikidata";
}

function buildFilters() {
  const countries = unique(stations.map(station => station.country));
  countryFilter.innerHTML = `<option value="">All countries</option>${countries.map(country => `<option>${escapeHTML(country)}</option>`).join("")}`;

  updateOperatorFilter();
}

function updateOperatorFilter() {
  const selectedOperator = operatorFilter.value;
  const country = countryFilter.value;
  const operators = unique(stations
    .filter(station => !country || station.country === country)
    .flatMap(station => station.operators || []));

  operatorFilter.innerHTML = `<option value="">All operators</option>${operators.map(operator => `<option>${escapeHTML(operator)}</option>`).join("")}`;
  operatorFilter.value = operators.includes(selectedOperator) ? selectedOperator : "";
}

function getFilteredStations() {
  const query = searchInput.value.trim().toLowerCase();
  const country = countryFilter.value;
  const source = sourceFilter.value;
  const operator = operatorFilter.value;

  return stations
    .filter(station => {
      const haystack = [
        station.name,
        station.country,
        station.source,
        ...(station.operators || [])
      ].join(" ").toLowerCase();

      return (!query || haystack.includes(query)) &&
        (!country || station.country === country) &&
        (!source || station.source === source) &&
        (!operator || station.operators?.includes(operator));
    })
    .sort((a, b) => {
      if (sortFilter.value === "country") return a.country.localeCompare(b.country) || a.name.localeCompare(b.name);
      if (sortFilter.value === "source") return a.source.localeCompare(b.source) || a.name.localeCompare(b.name);
      return a.name.localeCompare(b.name);
    });
}

function render() {
  const filtered = getFilteredStations();
  const capped = filtered.slice(0, 500);
  const wikidataCount = filtered.filter(station => station.source === "wikidata").length;
  const osmCount = filtered.filter(station => station.source === "osm").length;

  totalStat.textContent = filtered.length.toLocaleString();
  wikidataStat.textContent = wikidataCount.toLocaleString();
  osmStat.textContent = osmCount.toLocaleString();
  resultTitle.textContent = `${filtered.length.toLocaleString()} stations`;

  stationList.innerHTML = capped.length ? capped.map(station => `
    <article class="station-row" data-station-id="${escapeHTML(station.id)}">
      <div>
        <div class="station-name">${escapeHTML(station.name)}</div>
        <div class="station-meta">
          <span class="pill">${escapeHTML(station.country)}</span>
          <span class="pill ${station.source === "osm" ? "source-osm" : "source-wikidata"}">${stationSourceLabel(station.source)}</span>
          ${(station.operators || []).slice(0, 3).map(operator => `<span class="pill">${escapeHTML(operator)}</span>`).join("")}
        </div>
      </div>
      <a class="source-link" href="${escapeHTML(station.url)}" target="_blank" rel="noopener">Source</a>
    </article>
  `).join("") + (filtered.length > capped.length ? `<div class="empty">Showing first ${capped.length.toLocaleString()} results. Narrow the filters to see more.</div>` : "") : `<div class="empty">No stations match these filters.</div>`;

  // Highlight selected row (caller handles detail insertion to avoid double)
  if (selectedStationId) {
    highlightStationRow(selectedStationId);
  }
}

function renderAndRestoreDetail() {
  render();
  if (selectedStationId) {
    showInlineDetail(selectedStationId);
  }
}

Promise.all([
  fetch("./stations.json").then(response => response.json())
]).then(([data]) => {
  stations = Object.values(data.countries || {}).flatMap(country =>
    (country.stations || []).map(station => ({
      ...station,
      country: country.country
    }))
  );

  generatedAt.textContent = data.generatedAt ? `Updated ${new Date(data.generatedAt).toLocaleDateString()}` : "";
  buildFilters();
  render();
  restoreSelectedStation();
});

[searchInput, countryFilter, sourceFilter, operatorFilter, sortFilter].forEach(control => {
  control.addEventListener("input", renderAndRestoreDetail);
});

countryFilter.addEventListener("change", () => {
  updateOperatorFilter();
  renderAndRestoreDetail();
});
</script>
</body>
</html>
