server {
    listen 80;
    server_name trackandtide;

    root /usr/share/nginx/html;
    index index.html;

    error_page 404 /404.html;

    # Serve index.html directly — no internal redirect to avoid losing query strings
    location = / {
        try_files /index.html =404;
    }

    # Clean URLs: /stations → stations.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Redirect /index.html → / (avoid /index loop)
    location = /index.html {
        return 301 /;
    }

    # Redirect .html → clean URL
    location ~ ^/(.+)\.html$ {
        return 301 /$1;
    }
}