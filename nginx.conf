server {
    listen 80;
    server_name trackandtide trackandtide.com www.trackandtide.com;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    error_page 404 /404.html;

    # Serve custom 404 page (exact match takes precedence over regex redirect)
    location = /404.html {
        root /usr/share/nginx/html;
    }

    # Named fallback: triggers error_page → custom 404
    location @notfound {
        return 404;
    }

    # Serve index.html directly — no internal redirect to avoid losing query strings
    location = / {
        try_files /index.html @notfound;
    }

# Proxy AIS vessel data to Docker container on same host
    location /ais {
        proxy_pass http://192.168.188.140:3099/;
        add_header Access-Control-Allow-Origin *;
    }

    # Clean URLs: /stations → stations.html
    location / {
        try_files $uri $uri.html $uri/ @notfound;
    }

    # Redirect /index.html → / (avoid /index loop)
    location = /index.html {
        return 301 /;
    }

    # Redirect .html → clean URL (skip 404.html which is handled above)
    location ~ ^/(?!404\.html$)(.+)\.html$ {
        return 301 /$1;
    }
}