server {
    listen 80;
    server_name trackandtide trackandtide.com www.trackandtide.com;

    root /usr/share/nginx/html;
    index journey.html;

    charset utf-8;

    # Security & SEO headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=()" always;

    # Gzip compression for HTML, CSS, JS, JSON, SVG
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    error_page 404 /404.html;

    # Service Worker — must not be cached by the browser (update check every 24h max)
    location = /sw.js {
        add_header Cache-Control "public, max-age=86400";
        add_header Service-Worker-Allowed "/";
    }

    # Serve custom 404 page (exact match takes precedence over regex redirect)
    location = /404.html {
        root /usr/share/nginx/html;
    }

    # Named fallback: triggers error_page → custom 404
    location @notfound {
        return 404;
    }

    # Serve journey.html as landing page
    location = / {
        try_files /journey.html @notfound;
    }

    # Serve map at /map
    location = /map {
        try_files /index.html @notfound;
    }

# Proxy all API requests to departures-server (MOTIS)
    location /api/ {
        proxy_pass http://192.168.188.140:3098/;
        add_header Access-Control-Allow-Origin *;
        proxy_read_timeout 30s;
    }

    # Clean URLs: /stations → stations.html
    location / {
        try_files $uri $uri.html $uri/ @notfound;
    }

    # Redirect /index.html → /map (map is no longer landing)
    location = /index.html {
        return 301 /map;
    }

    # Redirect .html → clean URL (skip 404.html which is handled above)
    location ~ ^/(?!404\.html$)(.+)\.html$ {
        return 301 /$1;
    }
}