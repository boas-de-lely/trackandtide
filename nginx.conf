server {
    listen 80;
    server_name trackandtide;

    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs: /stations → stations.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Redirect .html → clean URL
    location ~ ^/(.*)\.html$ {
        return 301 /$1;
    }
}