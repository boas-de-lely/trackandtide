server {
    listen 80;
    server_name trackandtide;

    root /usr/share/nginx/html;
    index index.html;

    # Serve index.html directly — no internal redirect to avoid losing query strings
    location = / {
        try_files /index.html =404;
    }

    # Clean URLs: /stations → stations.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Redirect .html → clean URL (exclude index to avoid redirect loops)
    location ~ ^/(.+)\.html$ {
        return 301 /$1;
    }
}