<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track & Tide — Journey Planner</title>
  <meta name="description" content="Plan your train journey across Europe using open transit data. Search stations, compare routes, and discover rail connections." />
  <meta property="og:title" content="Track & Tide — Journey Planner" />
  <meta property="og:description" content="Plan your train journey across Europe using open transit data." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://trackandtide.com/" />
  <meta property="og:image" content="https://trackandtide.com/trackandtide%20logo%20full.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Track & Tide — Journey Planner" />
  <meta property="og:locale" content="en_GB" />
  <meta property="og:site_name" content="Track & Tide" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Track & Tide — Journey Planner" />
  <meta name="twitter:description" content="Plan your train journey across Europe using open transit data." />
  <meta name="twitter:image" content="https://trackandtide.com/trackandtide%20logo%20full.png" />
  <link rel="canonical" href="https://trackandtide.com/" />
  <link rel="icon" href="icon.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1F2937" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Track & Tide Journey Planner",
    "url": "https://trackandtide.com/journey",
    "description": "Plan your train journey across Europe using open transit data.",
    "applicationCategory": "TravelApplication",
    "operatingSystem": "Web",
    "isPartOf": {
      "@type": "WebApplication",
      "name": "Track & Tide",
      "url": "https://trackandtide.com/"
    }
  }
  </script>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css"/>

  <style>
    :root {
      --bg: #1F2937; --panel: #1F2937; --card: #273549;
      --text: #F8FAFC; --text-secondary: #94A3B8; --border: #3B4A5F;
      --hover: #38BDF8; --active: #0EA5E9; --rail: #F59E0B;
    }
    :root.light {
      --bg: #F1F5F9; --panel: #FFFFFF; --card: #F8FAFC;
      --text: #000; --text-secondary: #4B5563; --border: #D1D5DB;
      --hover: #0369A1; --active: #0284C7; --rail: #D97706;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: 0;
      background: url('map background photo.png') center/cover no-repeat;
      opacity: 0.12;
    }
    :root.light body::before { opacity: 0.08; }

    header { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; gap: 1rem; row-gap: 0.5rem; padding: 8px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    header img { width: 200px; }
    .main-nav { display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: center; }
    .main-nav a { color: var(--text); text-decoration: none; padding: 0.55rem 0.75rem; border-radius: 999px; opacity: 0.78; border: 1px solid transparent; }
    .main-nav a:hover, .main-nav a.active { opacity: 1; background: var(--card); border-color: var(--border); }
    .theme-switch { position: relative; display: inline-flex; align-items: center; width: 50px; height: 28px; flex-shrink: 0; }
    .theme-switch input { opacity: 0; width: 0; height: 0; }
    .theme-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--border); border-radius: 28px; transition: 0.3s; }
    .theme-slider::before { content: ""; position: absolute; height: 22px; width: 22px; left: 3px; bottom: 3px; background: var(--text); border-radius: 50%; transition: 0.3s; }
    .theme-switch input:checked + .theme-slider { background: var(--hover); }
    .theme-switch input:checked + .theme-slider::before { transform: translateX(22px); }

    .hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; background: none; border: none; cursor: pointer; padding: 8px; width: 40px; height: 40px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.25s; transform-origin: center; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .main-nav { display: none; flex-direction: column; position: absolute; top: 60px; left: 14px; right: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 0.5rem; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
      .main-nav.open { display: flex; }
      .main-nav a { border-radius: 8px; padding: 0.65rem 1rem; }
    }

    @media (max-width: 1000px) {
      header img { width: 120px; }
    }

    .container { max-width: 720px; margin: 0 auto; padding: 1.5rem 1.5rem 2rem; position: relative; z-index: 1; }

    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.25rem; }
    h1 + p { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1.25rem; }

    .search-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.25rem; margin-bottom: 1.5rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .search-form { display: grid; gap: 0.85rem; }
    .field { display: grid; gap: 0.25rem; }
    .field label { font-size: 0.78rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.04em; }
    .field input { width: 100%; padding: 0.65rem 0.8rem; border: 1px solid var(--border); border-radius: 10px; background: var(--card); color: var(--text); font: inherit; font-size: 0.92rem; outline: none; }
    .field input:focus { border-color: var(--active); }

    .swap-row { display: flex; justify-content: center; }
    .swap-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 0.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .swap-btn:hover { background: var(--border); }
    .swap-btn svg { width: 18px; height: 18px; stroke: currentColor; }

    .search-btn { padding: 0.75rem; background: var(--active); color: #fff; border: none; border-radius: 12px; font: inherit; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: background 0.2s; }
    .search-btn:hover { background: var(--hover); }
    .search-btn:disabled { opacity: 0.5; }

    .error { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 0.65rem 0.85rem; border-radius: 10px; font-size: 0.85rem; }

    /* ── Journey Card ── */
    .journey { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 1rem; cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s; }
    .journey:hover { border-color: var(--active); box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .journey-header { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; user-select: none; gap: 0.5rem; }
    .journey-header .expand-icon { font-size: 0.65rem; transition: transform 0.25s; opacity: 0.5; flex-shrink: 0; }
    .journey.expanded .journey-header .expand-icon { transform: rotate(180deg); opacity: 0.8; }
    .journey.expanded .journey-header { border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.03); }
    .journey-summary { flex: 1; min-width: 0; }
    .journey-summary .times { color: var(--text); font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .journey-summary .stations { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .journey-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
    .journey.expanded .journey-body { max-height: 1600px; overflow-y: auto; }
    /* ── Map (hidden until requested) ── */
    .tl-map-btn { display: block; width: 100%; padding: 0.6rem; background: none; border: none; border-top: 1px solid var(--border); color: var(--hover); font: inherit; font-size: 0.82rem; font-weight: 600; cursor: pointer; text-align: center; transition: background 0.15s; }
    .tl-map-btn:hover { background: rgba(56,189,248,0.08); }
    .journey-map { height: 350px; border-top: 1px solid var(--border); overflow: hidden; display: none; }
    .journey-transfers { font-size: 0.72rem; color: var(--text-secondary); text-align: right; }

    /* ── Timeline ── */
    .timeline { padding: 0.5rem 0 0.25rem; }

    /* Stop row: time · dot · station + platform */
    .tl-stop { display: flex; align-items: flex-start; gap: 0.65rem; padding: 0.15rem 0.5rem; position: relative; }
    .tl-stop-time-col { width: 68px; text-align: right; line-height: 1.2; flex-shrink: 0; white-space: nowrap; }
    .tl-stop-time { font-size: 1.05rem; font-weight: 800; color: var(--text); line-height: 1.4; font-variant-numeric: tabular-nums; }
    .tl-stop-dot { width: 12px; height: 12px; border-radius: 50%; border: 2.5px solid var(--rail); background: var(--card); flex-shrink: 0; margin-top: 5px; position: relative; z-index: 1; }
    .tl-stop:first-child .tl-stop-dot { border-color: #22D3EE; background: #22D3EE; }
    .tl-stop:last-child .tl-stop-dot { border-color: #EF4444; background: #EF4444; }
    .tl-stop-info { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 0.45rem; flex-wrap: wrap; line-height: 1.4; }
    .tl-stop-station { font-weight: 700; font-size: 0.9rem; color: var(--text); }
    .tl-stop-platform { font-size: 0.68rem; color: var(--text-secondary); background: rgba(128,128,128,0.12); padding: 1px 6px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }

    /* ── Light mode overrides ── */
    :root.light .tl-stop-time { color: #000 !important; }
    :root.light .tl-stop-station { color: #000 !important; }
    :root.light .journey-summary .times { color: #000 !important; }

    /* ── Delay display ── */
    .tl-delayed { color: #f87171 !important; }
    .tl-planned { font-size: 0.65rem; color: var(--text-secondary); opacity: 0.6; display: block; line-height: 1; text-decoration: line-through; }
    .tl-delay-inline { color: #f87171; font-size: 0.72rem; font-weight: 600; margin-left: 2px; }
    .tl-delay-badge { display: inline-block; font-size: 0.62rem; font-weight: 700; color: #f87171; background: rgba(239,68,68,0.15); padding: 1px 5px; border-radius: 4px; white-space: nowrap; margin-left: 4px; vertical-align: middle; }
    .tl-cancelled { opacity: 0.35; }
    .tl-cancelled-badge { display: inline-block; font-size: 0.62rem; font-weight: 700; color: #f87171; background: rgba(239,68,68,0.2); padding: 1px 5px; border-radius: 4px; white-space: nowrap; margin-left: 4px; vertical-align: middle; }
    .tl-day-badge { display: inline-block; font-size: 0.65rem; font-weight: 700; color: #a78bfa; background: rgba(139,92,246,0.15); padding: 1px 5px; border-radius: 4px; white-space: nowrap; margin-left: 4px; vertical-align: middle; }
    .night-icon { width: 16px; height: 16px; vertical-align: middle; margin-left: 4px; }
    html:not(.light) .night-icon { filter: invert(1); }

    /* ── Train info between stops ── */
    .tl-train { display: flex; align-items: stretch; gap: 1rem; padding: 0 0.5rem; }
    .tl-train-gutter { width: calc(68px + 0.65rem + 6px); flex-shrink: 0; position: relative; }
    .tl-train-line-wrap { position: absolute; right: 0; top: 0; bottom: 0; width: 3px; }
    .tl-train-line-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--rail); border-radius: 2px; }
    .tl-train-line-fill { position: absolute; bottom: 0; left: 0; right: 0; background: #D97706; border-radius: 2px; transition: height 0.3s; }
    .tl-dur-label { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 0.62rem; font-weight: 700; color: #fff; white-space: nowrap; z-index: 2; text-shadow: 0 1px 2px rgba(0,0,0,0.35); }
    :root.light .tl-dur-label { color: #000; text-shadow: none; }
    .tl-train-body { flex: 1; display: flex; flex-direction: column; gap: 0.1rem; padding: 0.1rem 0 0.3rem; min-width: 0; justify-content: center; }
    .tl-train-info { display: inline-flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; font-size: 0.78rem; cursor: pointer; user-select: none; align-self: flex-start; }
    .tl-train-info .tl-op { font-weight: 700; color: var(--rail); cursor: pointer; text-decoration: none; white-space: nowrap; }
    .tl-train-info .tl-op:hover { text-decoration: underline; opacity: 0.85; }
    .tl-train-info .tl-nr { font-weight: 600; color: var(--text); white-space: nowrap; }
    .tl-train-info .tl-dir { color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .tl-train-info .tl-stops { color: var(--text-secondary); font-size: 0.72rem; white-space: nowrap; }
    .tl-train-info .tl-stops:hover { color: var(--hover); }
    .tl-train-info .tl-stops-arrow { font-size: 0.6rem; margin-left: 2px; transition: transform 0.2s; display: inline-block; }
    .tl-train-info.open .tl-stops-arrow { transform: rotate(180deg); }

    /* ── Leg divider (between legs) ── */
    .tl-leg-divider { display: flex; align-items: center; gap: 0.65rem; padding: 0.1rem 0.5rem; }
    .tl-leg-divider-gutter { width: calc(68px + 0.65rem); flex-shrink: 0; }
    .tl-leg-divider-line { flex: 1; border-top: 1px solid var(--border); opacity: 0.8; }

    /* ── Intermediate stops foldout ── */
    .tl-stops-list { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .tl-stops-list.open { max-height: 600px; overflow-y: auto; }
    .tl-stops-list-inner { padding: 0.25rem 0 0.25rem 0.85rem; border-left: 2px solid var(--border); margin-left: 0.8rem; }
    .tl-stop-item { display: flex; align-items: center; gap: 0.4rem; padding: 0.15rem 0; font-size: 0.75rem; }
    .tl-stop-item-time { font-weight: 600; color: var(--text-secondary); min-width: 38px; text-align: right; font-variant-numeric: tabular-nums; font-size: 0.72rem; }
    .tl-stop-item-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text-secondary); opacity: 0.4; flex-shrink: 0; }
    .tl-stop-item-name { color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tl-stop-item-track { font-size: 0.65rem; color: var(--text-secondary); opacity: 0.7; }

    /* ── Transfer ── */
    .tl-xfer { display: flex; align-items: center; gap: 0.65rem; padding: 0.15rem 0.5rem 0.35rem; }
    .tl-xfer-gutter { width: calc(68px + 0.65rem); display: flex; justify-content: flex-end; align-items: center; flex-shrink: 0; }
    .tl-xfer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); flex-shrink: 0; opacity: 0.45; }
    .tl-xfer-text { font-size: 0.75rem; color: var(--text-secondary); }

    /* ── Depart/Arrive toggle ── */
    .deparr-toggle { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); user-select: none; }
    .deparr-toggle .switch { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
    .deparr-toggle .switch input { opacity: 0; width: 0; height: 0; }
    .deparr-toggle .switch-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--border); border-radius: 24px; transition: 0.25s; }
    .deparr-toggle .switch-slider::before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: var(--text); border-radius: 50%; transition: 0.25s; }
    .deparr-toggle .switch input:checked + .switch-slider { background: var(--active); }
    .deparr-toggle .switch input:checked + .switch-slider::before { transform: translateX(20px); }
    .deparr-toggle .active-label { color: var(--text); }
    .deparr-toggle .inactive-label { opacity: 0.5; }
    .deparr-row { display: flex; align-items: center; justify-content: space-between; margin-top: 0.5rem; gap: 0.75rem; }
    .min-transfer-select { border: 1px solid var(--border); border-radius: 8px; padding: 0.35rem 0.5rem; background: var(--card); color: var(--text-secondary); font: inherit; font-size: 0.78rem; cursor: pointer; flex-shrink: 0; }
    .page-nav { display: flex; justify-content: space-between; gap: 0.75rem; margin: 1rem 0; }
    .page-nav-btn { flex: 1; padding: 0.65rem 1rem; border: 1px solid var(--border); border-radius: 10px; background: var(--card); color: var(--hover); font: inherit; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .page-nav-btn:hover { background: rgba(56,189,248,0.08); border-color: var(--hover); }
    .page-nav-btn:disabled { opacity: 0.35; cursor: default; }

    .loading { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 0.9rem; }
    .no-results { text-align: center; padding: 2rem; color: var(--text-secondary); }

    .suggestions { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-top: 2px; max-height: 200px; overflow-y: auto; display: none; position: absolute; width: 100%; z-index: 10; }
    .suggestions.open { display: block; }
    .suggestion-item { padding: 0.5rem 0.8rem; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.4rem; }
    .suggestion-item:hover { background: rgba(56,189,248,0.1); }
    .suggestion-item .flag { flex-shrink: 0; display:inline-flex; align-items:center; }
    .field-wrapper { position: relative; }

    /* Via stops */
    .via-stops { margin-bottom: 0.25rem; }
    .via-field { margin-bottom: 0.5rem; }
    .via-wrapper { display: flex; align-items: center; gap: 0; }
    .via-input-wrap { position: relative; flex: 1; }
    .via-input-wrap input { width: 100%; border-top-right-radius: 0; border-bottom-right-radius: 0; }
    .via-remove-btn {
      background: var(--card); border: 1px solid var(--border); border-left: none;
      color: var(--text-secondary); font-size: 1.1rem; line-height: 1;
      padding: 0 0.65rem; cursor: pointer; border-radius: 0 10px 10px 0;
      transition: color 0.15s, background 0.15s;
      display: flex; align-items: center; justify-content: center;
      align-self: stretch;
    }
    .via-remove-btn:hover { color: #EF4444; background: rgba(239,68,68,0.08); }
    .via-add-btn {
      display: block; width: 100%; padding: 0.55rem;
      background: transparent; border: 1px dashed var(--border);
      color: var(--hover); font: inherit; font-size: 0.85rem; font-weight: 600;
      border-radius: 10px; cursor: pointer; transition: background 0.15s, border-color 0.15s;
      margin-bottom: 0.75rem;
    }
    .via-add-btn:hover { background: rgba(56,189,248,0.06); border-color: var(--hover); }


    .maplibregl-popup-content { background: var(--panel) !important; color: var(--text) !important; border: 1px solid var(--border) !important; border-radius: 10px !important; padding: 0.4rem 0.6rem !important; font-size: 0.82rem !important; }
    .maplibregl-popup-tip { border-top-color: var(--panel) !important; }

    .mobile-only { display: none; }
    @media (max-width: 768px) {
      header, .hamburger, .main-nav { display: none !important; }
      .mobile-only { display: inline; }
      .desktop-only { display: none; }
    }

    /* Saved journeys */
    .saved-section { margin-top: 1.5rem; }
    .saved-section h3 { font-size: 1rem; margin-bottom: 0.75rem; color: var(--text-secondary); }
    .saved-card-remove { background: none; border: none; color: #f87171; font-size: 1.1rem; cursor: pointer; padding: 0; opacity: 0.7; line-height: 1; flex-shrink: 0; margin-right: 0.35rem; }
    .saved-card-remove:hover { opacity: 1; }
    .save-btn { background: none; border: 1px solid var(--border); color: var(--text-secondary); font-size: 0.8rem; padding: 0.2rem 0.5rem; border-radius: 6px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .save-btn:hover { border-color: var(--hover); color: var(--hover); }
    .save-btn.saved { background: var(--hover); color: #fff; border-color: var(--hover); }
    .journey-progress { height: 5px; background: var(--border); border-radius: 0 0 10px 10px; overflow: hidden; position: relative; }
    .journey-progress-bar { height: 100%; background: var(--hover); transition: width 60s linear; border-radius: 0 0 0 10px; }
    .journey-progress-marker { position: absolute; top: 0; height: 100%; background: #f87171; opacity: 0.7; min-width: 2px; }
    .journey.expanded .journey-progress { display: none; }

  </style>
</head>
<body>

  <header>
    <a href="/"><img id="logo" src="trackandtide logo full.png" alt="Track & Tide" /></a>
    <button class="hamburger" id="hamburgerBtn" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <nav class="main-nav" aria-label="Main navigation" id="mainNav">
      <a href="/journey?v=3" class="active">Journey</a><a href="/map">Map</a><a href="/explore">Explore</a><a href="/more">More</a>
    </nav>
  </header>

  <div class="container">
    <h1>Journey Planner</h1>
    <p>Plan your trip across Europe</p>

    <div class="search-card">
    <div class="search-form">
      <div class="field">
        <label for="fromInput">From</label>
        <div class="field-wrapper">
          <input type="text" id="fromInput" placeholder="Station name..." autocomplete="off" />
          <div class="suggestions" id="fromSuggestions"></div>
        </div>
      </div>

  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>

  <script>
    // ── Firebase ──
    var db = null;
    try {
      firebase.initializeApp({
        apiKey: "AIzaSyADhp9j4huAl0rZQn9RSem8x3O7g2dyI1A",
        authDomain: "trackandtide-00.firebaseapp.com",
        projectId: "trackandtide-00",
        storageBucket: "trackandtide-00.firebasestorage.app",
        appId: "1:157938380271:web:8b36389f334e3adefdda1a"
      });
      db = firebase.firestore();
    } catch(e) {
      console.warn("Firebase init failed:", e.message);
    }

    var fromStation = null, toStation = null;
    var viaStations = [null, null];
    var lastSearchParams = null;
    var prevPageCursor = null, nextPageCursor = null;
    var journeyMap = null;
    var currentJourneys = [];
    var activeJourney = -1;
    var mapMarkers = [];
    var LINE_ID = 'journey-line';
    var OP_COLORS = ['#F59E0B','#3B82F6','#EF4444','#10B981','#8B5CF6','#EC4899','#06B6D4','#F97316','#84CC16','#F43F5E'];
    var allStations = [];

    // Load station database for local search
    fetch('/stations.json').then(function(r) { return r.json(); }).then(function(data) {
      for (var c in data.countries) {
        var iso = data.countries[c].iso || '';
        (data.countries[c].stations||[]).forEach(function(s) {
          allStations.push({ name: s.name, lat: s.lat, lng: s.lng, country: iso });
        });
      }
    });

    // Convert ISO country code to flag image
    function isoToFlag(iso) {
      if (!iso || iso.length !== 2) return '';
      return '<img src="/flags/' + iso.toLowerCase() + '.png" width="20" height="13" alt="' + iso + '" style="vertical-align:middle;border-radius:1px" />';
    }

    // Decode Google-encoded polyline (precision 6 = 1e6 scaling, as used by MOTIS nigiri)
    function decodePolyline(encoded) {
      var poly = [];
      var index = 0, len = encoded.length;
      var lat = 0, lng = 0;
      while (index < len) {
        var b, shift = 0, result = 0;
        do {
          b = encoded.charCodeAt(index++) - 63;
          result |= (b & 0x1f) << shift;
          shift += 5;
        } while (b >= 0x20);
        var dlat = (result & 1) ? ~(result >> 1) : (result >> 1);
        lat += dlat;
        shift = 0; result = 0;
        do {
          b = encoded.charCodeAt(index++) - 63;
          result |= (b & 0x1f) << shift;
          shift += 5;
        } while (b >= 0x20);
        var dlng = (result & 1) ? ~(result >> 1) : (result >> 1);
        lng += dlng;
        poly.push([lng / 1e6, lat / 1e6]);
      }
      return poly;
    }

    function initDateTime() {
      var now = new Date();
      document.getElementById('dateInput').value = now.toISOString().split('T')[0];
      document.getElementById('timeInput').value = now.toTimeString().slice(0,5);
    }
    initDateTime();

    function updateDepArrLabel() {
      var checked = document.getElementById('arriveByToggle').checked;
      var depLabel = document.getElementById('depLabel');
      var arrLabel = document.getElementById('arrLabel');
      if (checked) {
        depLabel.className = 'inactive-label';
        arrLabel.className = 'active-label';
      } else {
        depLabel.className = 'active-label';
        arrLabel.className = 'inactive-label';
      }
    }

    function destroyMap() {
      if (journeyMap) { journeyMap.remove(); journeyMap = null; }
      mapMarkers = [];
    }

    function initMapInCard(journey, containerId) {
      destroyMap();
      var cid = containerId || 'journeyMap';
      var container = document.getElementById(cid);
      if (!container) return;
      var isLight = document.documentElement.classList.contains('light');
      journeyMap = new maplibregl.Map({
        container: cid,
        style: isLight ? 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json' : 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [10, 50], zoom: 4, attributionControl: false
      });
      journeyMap.addControl(new maplibregl.AttributionControl({ compact: true }));
      journeyMap.on('load', function() {
        journeyMap.addSource(LINE_ID, { type: 'geojson', data: { type:'FeatureCollection', features: [] } });
        journeyMap.addLayer({ id: LINE_ID, type: 'line', source: LINE_ID,
          paint: { 'line-color': ['get','color'], 'line-width': 4, 'line-opacity': 0.85 },
          layout: { 'line-cap': 'round', 'line-join': 'round' }
        });
        showJourneyOnMap(journey, true);
      });
    }

    function toggleJourney(idx) {
      if (activeJourney === idx) {
        destroyMap();
        activeJourney = -1;
        renderJourneys();
      } else {
        destroyMap();
        activeJourney = idx;
        renderJourneys();
      }
    }

    function showJourneyMap(ji) {
      var mapDiv = document.getElementById('journeyMap');
      if (!mapDiv) return;
      mapDiv.style.display = 'block';
      initMapInCard(currentJourneys[ji]);
      var btn = document.getElementById('mapBtn');
      if (btn) btn.style.display = 'none';
    }

    var searchTimeout;
    function setupSearch(inputId, suggestId, setFn) {
      var input = document.getElementById(inputId);
      var suggest = document.getElementById(suggestId);
      input.addEventListener('input', function() {
        clearTimeout(searchTimeout);
        var q = input.value.trim();
        if (q.length < 2) { suggest.classList.remove('open'); return; }
        searchTimeout = setTimeout(function() {
          var qLower = normalizeForSearch(q);
          // Exact/diacritic matches first
          var matches = allStations.filter(function(s) {
            return normalizeForSearch(s.name).indexOf(qLower) !== -1;
          });
          // Fill remaining slots with fuzzy matches
          if (matches.length < 8) {
            var seen = {};
            matches.forEach(function(s) { seen[s.name] = true; });
            var fuzzy = allStations.filter(function(s) {
              return !seen[s.name] && fuzzyMatchScore(qLower, normalizeForSearch(s.name)) > 0;
            });
            matches = matches.concat(fuzzy);
          }
          matches = matches.slice(0, 8);
          if (!matches.length) { suggest.classList.remove('open'); return; }
          suggest.innerHTML = matches.map(function(s) {
            var flag = isoToFlag(s.country);
            return '<div class="suggestion-item" data-lat="'+s.lat+'" data-lng="'+s.lng+'" data-name="'+s.name+'"><span class="flag">'+flag+'</span> '+s.name+'</div>';
          }).join('');
          suggest.classList.add('open');
          suggest.querySelectorAll('.suggestion-item').forEach(function(item) {
            item.addEventListener('click', function() {
              setFn({ lat: parseFloat(item.dataset.lat), lng: parseFloat(item.dataset.lng), name: item.dataset.name });
              input.value = item.dataset.name;
              suggest.classList.remove('open');
            });
          });
        }, 150);
      });
      input.addEventListener('blur', function() { setTimeout(function() { suggest.classList.remove('open'); }, 200); });
    }
    setupSearch('fromInput', 'fromSuggestions', function(s) { fromStation = s; });
    setupSearch('toInput', 'toSuggestions', function(s) { toStation = s; });
    setupSearch('viaInput1', 'viaSuggestions1', function(s) { viaStations[0] = s; });
    setupSearch('viaInput2', 'viaSuggestions2', function(s) { viaStations[1] = s; });

    var viaCount = 0;
    function addViaStop() {
      if (viaCount >= 2) return;
      viaCount++;
      document.getElementById('viaField' + viaCount).style.display = '';
      if (viaCount >= 2) document.getElementById('addViaBtn').style.display = 'none';
    }
    function removeViaStop(n) {
      // Shift fields down: remove field n, shift later fields up
      for (var i = n; i <= viaCount; i++) {
        var next = i + 1;
        if (next <= viaCount) {
          document.getElementById('viaInput' + i).value = document.getElementById('viaInput' + next).value;
          viaStations[i - 1] = viaStations[next - 1];
        } else {
          document.getElementById('viaInput' + i).value = '';
          viaStations[i - 1] = null;
        }
      }
      document.getElementById('viaField' + viaCount).style.display = 'none';
      viaCount--;
      document.getElementById('addViaBtn').style.display = '';
    }

    // Pre-fill station from URL parameters (?from=... or ?to=...)
    function prefillFromURL() {
      var params = new URLSearchParams(window.location.search);
      var fromName = params.get('from');
      var toName = params.get('to');
      if (fromName) {
        document.getElementById('fromInput').value = fromName;
        var match = allStations.find(function(s) { return normalizeForSearch(s.name) === normalizeForSearch(fromName); });
        if (match) fromStation = { lat: match.lat, lng: match.lng, name: match.name };
      }
      if (toName) {
        document.getElementById('toInput').value = toName;
        var match = allStations.find(function(s) { return normalizeForSearch(s.name) === normalizeForSearch(toName); });
        if (match) toStation = { lat: match.lat, lng: match.lng, name: match.name };
      }
    }
    // Wait for allStations to load, then prefill
    var stationLoadCheck = setInterval(function() {
      if (allStations.length > 0) { clearInterval(stationLoadCheck); prefillFromURL(); }
    }, 200);

    function swapStations() {
      var fi = document.getElementById('fromInput'), ti = document.getElementById('toInput');
      var tmpVal = fi.value; fi.value = ti.value; ti.value = tmpVal;
      var tmp = fromStation; fromStation = toStation; toStation = tmp;
    }

    function clearMap() {
      mapMarkers.forEach(function(m) { m.remove(); });
      mapMarkers = [];
      if (journeyMap && journeyMap.getSource(LINE_ID)) {
        journeyMap.getSource(LINE_ID).setData({ type:'FeatureCollection', features: [] });
      }
    }

    function showJourneyOnMap(journey, fit) {
      clearMap();
      if (!journey || !journey.legs) return;

      // Build a color map: same operator → same color
      var opColors = {};
      var nextColor = 0;
      function colorFor(op) {
        var key = (op||'').toLowerCase();
        if (!opColors[key]) { opColors[key] = OP_COLORS[nextColor++ % OP_COLORS.length]; }
        return opColors[key];
      }

      var features = [];
      var allCoords = [];
      var railLegs = journey.legs.filter(function(l) { return l.mode !== 'WALK'; });

      railLegs.forEach(function(leg, i) {
        var coords = [];
        if (leg.legGeometry && leg.legGeometry.points) {
          coords = decodePolyline(leg.legGeometry.points);
        } else if (leg.from && leg.from.lat && leg.from.lon && leg.to && leg.to.lat && leg.to.lon) {
          coords = [[leg.from.lon, leg.from.lat], [leg.to.lon, leg.to.lat]];
        }
        if (coords.length) {
          allCoords = allCoords.concat(coords);
          features.push({
            type: 'Feature',
            geometry: { type: 'LineString', coordinates: coords },
            properties: { color: colorFor(leg.agencyName||leg.routeShortName||leg.route||'') }
          });
        }
      });

      if (!allCoords.length) return;

      // Origin marker (cyan)
      var first = allCoords[0];
      [
        { coord: first, color: '#22D3EE', label: 'Start' }
      ].forEach(function(pt) {
        var el = document.createElement('div');
        el.style.cssText = 'width:16px;height:16px;border-radius:50%;background:'+pt.color+';border:3px solid #fff;box-shadow:0 0 8px rgba(0,0,0,0.4)';
        el.title = pt.label;
        mapMarkers.push(new maplibregl.Marker({element:el}).setLngLat(pt.coord).addTo(journeyMap));
      });

      // Destination marker (red)
      var last = allCoords[allCoords.length-1];
      [
        { coord: last, color: '#EF4444', label: 'End' }
      ].forEach(function(pt) {
        var el = document.createElement('div');
        el.style.cssText = 'width:16px;height:16px;border-radius:50%;background:'+pt.color+';border:3px solid #fff;box-shadow:0 0 8px rgba(0,0,0,0.4)';
        el.title = pt.label;
        mapMarkers.push(new maplibregl.Marker({element:el}).setLngLat(pt.coord).addTo(journeyMap));
      });

      // Transfer/change markers (small dots at each leg's .to, except last leg)
      for (var i = 0; i < railLegs.length - 1; i++) {
        var to = railLegs[i].to;
        if (to && to.lat && to.lon) {
          var tel = document.createElement('div');
          tel.style.cssText = 'width:10px;height:10px;border-radius:50%;background:#F59E0B;border:2px solid #fff;box-shadow:0 0 4px rgba(0,0,0,0.4)';
          tel.title = 'Change at ' + (to.name||'');
          mapMarkers.push(new maplibregl.Marker({element:tel}).setLngLat([to.lon, to.lat]).addTo(journeyMap));
        }
      }

      if (journeyMap.getSource(LINE_ID)) {
        journeyMap.getSource(LINE_ID).setData({
          type: 'FeatureCollection',
          features: features
        });
      }

      if (fit) {
        var bounds = new maplibregl.LngLatBounds();
        allCoords.forEach(function(c) { bounds.extend(c); });
        journeyMap.fitBounds(bounds, { padding: 40, maxZoom: 10 });
      }
    }

    function buildSearchUrl(pageCursor) {
      var date = document.getElementById('dateInput').value;
      var time = document.getElementById('timeInput').value || '12:00';
      var localDate = new Date(date + 'T' + time);
      var dateTime = localDate.toISOString();
      var arriveBy = document.getElementById('arriveByToggle').checked;
      var url = '/api/departures?action=plan' +
        '&fromPlace=' + fromStation.lat + ',' + fromStation.lng +
        '&toPlace=' + toStation.lat + ',' + toStation.lng +
        (arriveBy ? '&arriveBy=true&departureTime=' : '&departureTime=') + encodeURIComponent(dateTime) +
        '&numItineraries=12' +
        '&mode=RAIL' +
        '&maxWalkDistance=1000' +
        '&walkSpeed=1.4' +
        '&minTransferTime=' + document.getElementById('minTransferSelect').value;
      for (var v = 0; v < viaCount; v++) {
        if (viaStations[v]) url += '&via=' + viaStations[v].lat + ',' + viaStations[v].lng;
      }
      if (pageCursor) url += '&pageCursor=' + encodeURIComponent(pageCursor);
      return url;
    }

    function searchJourney(pageCursor) {
      var errEl = document.getElementById('errorMsg');
      var resultsEl = document.getElementById('results');
      var btn = document.getElementById('searchBtn');
      errEl.style.display = 'none';
      if (!fromStation || !toStation) {
        errEl.textContent = 'Please select both stations from the suggestions.';
        errEl.style.display = ''; return;
      }
      var isPageLoad = !!pageCursor;
      if (!isPageLoad) {
        btn.disabled = true; btn.textContent = 'Searching...';
        resultsEl.innerHTML = '<div class="loading">Searching...</div>';
        destroyMap();
        activeJourney = -1;
      }
      var url = buildSearchUrl(pageCursor);
      if (!isPageLoad) lastSearchParams = url;
      fetch(url).then(function(r) { return r.json(); }).then(function(data) {
        btn.disabled = false; btn.textContent = 'Search';
        if (db && !isPageLoad) {
          db.collection('stats').doc('journeys').set(
            { count: firebase.firestore.FieldValue.increment(1), updatedAt: firebase.firestore.FieldValue.serverTimestamp() },
            { merge: true }
          ).catch(function(err) { console.warn('Journey counter update failed:', err.message); });
        }
        if (data.error) {
          errEl.textContent = 'Search failed: ' + data.error;
          errEl.style.display = ''; resultsEl.innerHTML = ''; return;
        }
        var raw = (data.plan && data.plan.itineraries) || data.itineraries || [];
        // Read page cursors from all possible locations (MOTIS/nigiri varies)
        prevPageCursor = data.previousPageCursor
          || (data.metadata && data.metadata.previousPageCursor)
          || (data.plan && data.plan.previousPageCursor)
          || null;
        nextPageCursor = data.nextPageCursor
          || (data.metadata && data.metadata.nextPageCursor)
          || (data.plan && data.plan.nextPageCursor)
          || null;
        console.log('[page] response keys:', Object.keys(data).join(', '));
        if (data.metadata) console.log('[page] metadata keys:', Object.keys(data.metadata).join(', '));
        if (data.plan) console.log('[page] plan keys:', Object.keys(data.plan).join(', '));
        console.log('[page] prev:', prevPageCursor ? prevPageCursor.substring(0, 40)+'...' : null, 'next:', nextPageCursor ? nextPageCursor.substring(0, 40)+'...' : null);
        // Only keep train & rail replacement buses — no coach, tram, metro
        var blocked = ['COACH','TRAM','SUBWAY','METRO','GONDOLA','CABLE_CAR','FUNICULAR'];
        var filtered = raw.filter(function(j) {
          return (j.legs||[]).every(function(l) {
            var m = (l.mode||'').toUpperCase();
            return !blocked.some(function(b) { return m.indexOf(b) >= 0; });
          });
        });
        currentJourneys = filtered.slice(0, 8);
        activeJourney = -1;
        if (!currentJourneys.length) { resultsEl.innerHTML = '<div class="no-results">No train journeys found.</div>'; return; }
        renderJourneys();
      }).catch(function(e) {
        btn.disabled = false; btn.textContent = 'Search';
        errEl.textContent = 'Search failed. Check your connection and try again.';
        errEl.style.display = ''; resultsEl.innerHTML = ''; console.error(e);
      });
    }

    function loadEarlier() {
      if (!prevPageCursor) return;
      var btn = document.querySelector('.page-nav-btn.earlier-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Loading earlier trips…'; }
      var oldJourneys = currentJourneys.slice();
      fetch(lastSearchParams + '&pageCursor=' + encodeURIComponent(prevPageCursor))
        .then(function(r) { return r.json(); }).then(function(data) {
          var raw = (data.plan && data.plan.itineraries) || data.itineraries || [];
          prevPageCursor = data.previousPageCursor
            || (data.metadata && data.metadata.previousPageCursor)
            || (data.plan && data.plan.previousPageCursor)
            || null;
          console.log('[page earlier] prev:', prevPageCursor ? prevPageCursor.substring(0,40)+'...' : null);
          var blocked = ['COACH','TRAM','SUBWAY','METRO','GONDOLA','CABLE_CAR','FUNICULAR'];
          var filtered = raw.filter(function(j) {
            return (j.legs||[]).every(function(l) {
              var m = (l.mode||'').toUpperCase();
              return !blocked.some(function(b) { return m.indexOf(b) >= 0; });
            });
          });
          var fresh = filtered.slice(0, 8);
          if (!fresh.length && !oldJourneys.length) { document.getElementById('results').innerHTML = '<div class="no-results">No earlier journeys found.</div>'; return; }
          currentJourneys = fresh.concat(oldJourneys);
          activeJourney = -1;
          renderJourneys();
        }).catch(function(e) { console.error(e); });
    }

    function loadLater() {
      if (!nextPageCursor) return;
      var btn = document.querySelector('.page-nav-btn.later-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Loading later trips…'; }
      var oldJourneys = currentJourneys.slice();
      fetch(lastSearchParams + '&pageCursor=' + encodeURIComponent(nextPageCursor))
        .then(function(r) { return r.json(); }).then(function(data) {
          var raw = (data.plan && data.plan.itineraries) || data.itineraries || [];
          nextPageCursor = data.nextPageCursor
            || (data.metadata && data.metadata.nextPageCursor)
            || (data.plan && data.plan.nextPageCursor)
            || null;
          console.log('[page later] next:', nextPageCursor ? nextPageCursor.substring(0,40)+'...' : null);
          var blocked = ['COACH','TRAM','SUBWAY','METRO','GONDOLA','CABLE_CAR','FUNICULAR'];
          var filtered = raw.filter(function(j) {
            return (j.legs||[]).every(function(l) {
              var m = (l.mode||'').toUpperCase();
              return !blocked.some(function(b) { return m.indexOf(b) >= 0; });
            });
          });
          var fresh = filtered.slice(0, 8);
          if (!fresh.length && !oldJourneys.length) { document.getElementById('results').innerHTML = '<div class="no-results">No later journeys found.</div>'; return; }
          currentJourneys = oldJourneys.concat(fresh);
          activeJourney = -1;
          renderJourneys();
        }).catch(function(e) { console.error(e); });
    }

    var OPERATOR_SLUGS = {
      'ns': 'ns','nederlandse spoorwegen': 'ns','arriva': 'arriva','blauwnet': 'blauwnet',
      'keolis': 'keolis','connexxion': 'connexxion','qbuzz': 'qbuzz','eurostar': 'eurostar',
      'thalys': 'thalys','ice':'ice','nmbs':'nmbs','sncb':'nmbs','db':'db','öbb':'obb',
      'sbb':'sbb','sncf':'sncf','trenitalia':'trenitalia','renfe':'renfe','cfl':'cfl'
    };
    // Unique counter for each leg to create unique IDs
    var _legUid = 0;

    function fmtTime(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      var h = d.getHours(), m = d.getMinutes();
      return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
    }

    function durStr(sec) {
      var m = Math.round((sec||0)/60);
      if (m < 60) return m + ' min';
      var h = Math.floor(m/60);
      return h + 'h ' + (m%60) + 'min';
    }

    function opLink(agencyName) {
      if (!agencyName) return '';
      var key = (agencyName||'').toLowerCase();
      var slug = OPERATOR_SLUGS[key] || '';
      if (slug) {
        return '<a href="/explore?operator='+slug+'" class="tl-op" onclick="event.stopPropagation()" title="View '+agencyName+'">'+agencyName+'</a>';
      }
      return '<span class="tl-op" style="cursor:default">'+agencyName+'</span>';
    }

    function trainType(routeName) {
      if (!routeName) return '';
      var m = routeName.match(/^([A-Za-z]+)\d/);
      if (m) return m[1];
      return routeName;
    }

    function delayMin(scheduledIso, actualIso) {
      if (!scheduledIso || !actualIso) return 0;
      return Math.round((new Date(actualIso) - new Date(scheduledIso)) / 60000);
    }

    function legProgressPct(leg) {
      var dep = leg.from && (leg.from.departure||leg.startTime);
      var arr = leg.to && leg.to.arrival;
      if (!dep || !arr) return 0;
      var now = Date.now();
      var depMs = new Date(dep).getTime();
      var arrMs = new Date(arr).getTime();
      if (now <= depMs) return 0;
      if (now >= arrMs) return 100;
      return Math.round(((now - depMs) / (arrMs - depMs)) * 100);
    }

    function toggleLegStops(uid, e) {
      e.stopPropagation();
      var info = document.getElementById('tlinfo_'+uid);
      var list = document.getElementById('tlstops_'+uid);
      if (!info || !list) return;
      var open = list.classList.contains('open');
      if (open) { list.classList.remove('open'); info.classList.remove('open'); }
      else { list.classList.add('open'); info.classList.add('open'); }
    }

    // Compute transit-only duration: first non-walk departure → last non-walk arrival
    function transitDurMin(journey) {
      var nonWalk = (journey.legs||[]).filter(function(l) { return l.mode !== 'WALK'; });
      if (!nonWalk.length) return Math.round(journey.duration/60);
      var firstDep = nonWalk[0].from.departure || nonWalk[0].startTime;
      var lastArr = nonWalk[nonWalk.length-1].to.arrival;
      if (!firstDep || !lastArr) return Math.round(journey.duration/60);
      return Math.round((new Date(lastArr) - new Date(firstDep)) / 60000);
    }

    // Look up a station in the local database by coordinates, falling back to MOTIS name
    function lookupDbStation(motisName, lat, lng) {
      if (lat != null && lng != null) {
        for (var i = 0; i < allStations.length; i++) {
          var s = allStations[i];
          if (Math.abs(s.lat - lat) < 0.005 && Math.abs(s.lng - lng) < 0.005) {
            return s.name;
          }
        }
      }
      return motisName || '';
    }

    function renderJourneyCard(j, ji, isExpanded, removeId) {
        var legs = (j.legs||[]).filter(function(l) { return l.mode !== 'WALK'; });
        var durMin = transitDurMin(j);
        var firstFrom = legs[0]&&legs[0].from;
        var fromName = lookupDbStation(firstFrom?firstFrom.name:'', firstFrom?firstFrom.lat:null, firstFrom?firstFrom.lon:null);
        var lastLeg = legs[legs.length-1];
        var lastTo = lastLeg&&lastLeg.to;
        var toName = lookupDbStation(lastTo?lastTo.name:'', lastTo?lastTo.lat:null, lastTo?lastTo.lon:null);
        var transitStart = legs[0] && (legs[0].from.departure || legs[0].startTime);
        var transitEnd = lastLeg && lastLeg.to && lastLeg.to.arrival;
        var schedStart = legs[0] && (legs[0].from.scheduledDeparture || legs[0].from.departure || legs[0].startTime);
        var schedEnd = lastLeg && lastLeg.to && (lastLeg.to.scheduledArrival || lastLeg.to.arrival);
        var startDelay = delayMin(schedStart, transitStart);
        var endDelay = lastLeg && lastLeg.to && lastLeg.to.arrival ? delayMin(schedEnd, transitEnd) : 0;
        var dayDiff = 0;
        if (transitStart && transitEnd) {
          var sd = new Date(transitStart), ed = new Date(transitEnd);
          dayDiff = Math.round((new Date(ed.getFullYear(),ed.getMonth(),ed.getDate()) - new Date(sd.getFullYear(),sd.getMonth(),sd.getDate())) / 864e5);
        }
        var hasNightTrain = (j.legs||[]).some(function(l) { return l.mode === 'NIGHT_RAIL'; });
        // Compute delay/cancellation status for header badge
        var allLegs = (j.legs||[]).filter(function(l) { return l.mode !== 'WALK'; });
        var hasCancelledLeg = allLegs.some(function(l) { return (l.from&&l.from.cancelled) || (l.to&&l.to.cancelled); });
        var maxDelay = 0;
        allLegs.forEach(function(l) {
          var depSched = l.from&&l.from.scheduledDeparture, depAct = l.from&&(l.from.departure||l.startTime);
          var arrSched = l.to&&l.to.scheduledArrival, arrAct = l.to&&l.to.arrival;
          if (depSched && depAct) maxDelay = Math.max(maxDelay, delayMin(depSched, depAct));
          if (arrSched && arrAct) maxDelay = Math.max(maxDelay, delayMin(arrSched, arrAct));
        });
        var timelineHtml = buildTimeline(j);
        var headerBtn = '';
        if (removeId != null) {
          headerBtn = '<button class="saved-card-remove" onclick="event.stopPropagation();removeSavedJourney('+removeId+')" title="Remove">\u00D7</button>';
        }
        var bodyBtn = '';
        if (ji != null && isExpanded) {
          bodyBtn = '<button class="save-btn" style="display:block;margin:0.5rem auto 0.5rem" onclick="event.stopPropagation();saveJourney('+ji+')">Save journey</button><button id="mapBtn" class="tl-map-btn" onclick="event.stopPropagation();showJourneyMap('+ji+')">Show on map</button><div id="journeyMap" class="journey-map"></div>';
        }
        if (removeId != null && isExpanded) {
          bodyBtn = '<button id="mapBtn" class="tl-map-btn" onclick="event.stopPropagation();showSavedJourneyMap('+removeId+')">Show on map</button><div id="savedJourneyMap" class="journey-map"></div>';
        }
        var clickHandler = (ji != null || removeId != null) ? ' onclick="'+(removeId!=null?'toggleSavedJourney('+removeId+')':'toggleJourney('+ji+')')+'"' : '';
        var progressHtml = '';
        if (transitStart && transitEnd) {
          var now = Date.now(), start = new Date(transitStart).getTime(), end = new Date(transitEnd).getTime();
          var pct = Math.max(0, Math.min(100, Math.round((now - start) / (end - start) * 100)));
          if (pct > 0 || j.transfers > 0) {
            var markers = '';
            var nonWalk = (j.legs||[]).filter(function(l) { return l.mode !== 'WALK'; });
            for (var mi = 0; mi < nonWalk.length - 1; mi++) {
              var legEnd = nonWalk[mi].to && nonWalk[mi].to.arrival;
              var nextStart = nonWalk[mi+1].from && nonWalk[mi+1].from.departure;
              if (legEnd && nextStart) {
                var mp = Math.max(0, Math.round((new Date(legEnd).getTime() - start) / (end - start) * 100));
                var mw = Math.max(2, Math.round((new Date(nextStart).getTime() - new Date(legEnd).getTime()) / (end - start) * 100));
                markers += '<div class="journey-progress-marker" style="left:'+mp+'%;width:'+mw+'%"></div>';
              }
            }
            progressHtml = '<div class="journey-progress"><div class="journey-progress-bar" style="width:'+pct+'%"></div>'+markers+'</div>';
          }
        }
        var timesHtml = '';
        if (transitStart && transitEnd) {
          var startPart = '', endPart = '';
          if (hasCancelledLeg) {
            startPart = '<span class="tl-cancelled">'+fmtTime(schedStart)+'</span>';
            endPart = '<span class="tl-cancelled">'+fmtTime(schedEnd)+'</span>';
          } else if (maxDelay > 0) {
            startPart = (startDelay>0?'<span class="tl-planned" style="display:inline">'+fmtTime(schedStart)+'</span> ':'')+'<span'+(startDelay>0?' class="tl-delayed"':'')+'>'+fmtTime(transitStart)+'</span>';
            endPart = (endDelay>0?'<span class="tl-planned" style="display:inline">'+fmtTime(schedEnd)+'</span> ':'')+'<span'+(endDelay>0?' class="tl-delayed"':'')+'>'+fmtTime(transitEnd)+'</span>';
          } else {
            startPart = fmtTime(transitStart);
            endPart = fmtTime(transitEnd);
          }
          timesHtml = startPart+' – '+endPart;
        }
        return '<div class="journey'+(isExpanded?' expanded':'')+'"'+clickHandler+'>' +
          '<div class="journey-header">' +
            headerBtn +
            '<div class="journey-summary">' +
              '<div class="times">'+timesHtml+(dayDiff > 0 ? ' <span class="tl-day-badge">+'+dayDiff+'d</span>' : '')+(hasNightTrain ? ' <img src="webapp icons/moon.png" class="night-icon" alt="night train" title="Night train">' : '')+'</div>' +
              '<div class="stations">'+fromName+' → '+toName+'</div>' +
            '</div>' +
            '<div>' +
              '<div class="journey-duration">'+Math.floor(durMin/60)+'h '+(durMin%60)+'min</div>' +
              '<div class="journey-transfers">'+(j.transfers===0?'Direct':j.transfers+' change'+(j.transfers!==1?'s':''))+'</div>' +
            '</div>' +
            '<span class="expand-icon">▼</span>' +
          '</div>' +
          progressHtml +
          '<div class="journey-body">' +
            '<div class="timeline">'+timelineHtml+'</div>' +
            bodyBtn +
          '</div>' +
        '</div>';
    }

    function buildTimeline(j) {
      var legs = (j.legs||[]).filter(function(l) { return l.mode !== 'WALK'; });
      var html = '';
      for (var li = 0; li < legs.length; li++) {
        var leg = legs[li];
        var uid = ++_legUid;
        var depActual = leg.from.departure||leg.startTime;
        var depScheduled = leg.from.scheduledDeparture || depActual;
        var arrActual = leg.to&&leg.to.arrival ? leg.to.arrival : null;
        var arrScheduled = leg.to&&leg.to.scheduledArrival ? leg.to.scheduledArrival : arrActual;
        var depTime = fmtTime(depActual);
        var arrTime = fmtTime(arrActual);
        var fromNameL = lookupDbStation((leg.from&&leg.from.name)||'', leg.from?leg.from.lat:null, leg.from?leg.from.lon:null);
        var toNameL = lookupDbStation((leg.to&&leg.to.name)||'', leg.to?leg.to.lat:null, leg.to?leg.to.lon:null);
        var routeName = leg.routeShortName||leg.route||'';
        var direction = leg.headsign||'';
        var agency = leg.agencyName||'';
        var depTrack = leg.from.track||'';
        var arrTrack = leg.to&&leg.to.track ? leg.to.track : '';
        var stops = leg.intermediateStops || [];
        var stopCount = stops.length;
        var type = trainType(routeName);
        var cancelled = (leg.from&&leg.from.cancelled) || (leg.to&&leg.to.cancelled) || false;
        var depDelay = delayMin(depScheduled, depActual);
        var arrDelay = arrActual ? delayMin(arrScheduled, arrActual) : 0;
        var trainLabel = agency;
        if (agency && type && type !== routeName) { trainLabel = agency + ' ' + type; }
        var pct = legProgressPct(leg);

        var depTimeHtml = '';
        if (cancelled) {
          depTimeHtml = '<div class="tl-stop-time tl-cancelled">'+fmtTime(depScheduled)+'</div>';
        } else if (depDelay > 0) {
          depTimeHtml = '<div class="tl-stop-time">'+fmtTime(depScheduled)+' <span class="tl-delay-inline">+'+depDelay+'</span></div>';
        } else {
          depTimeHtml = '<div class="tl-stop-time">'+depTime+'</div>';
        }
        html += '<div class="tl-stop"><div class="tl-stop-time-col">'+depTimeHtml+'</div><div class="tl-stop-dot"></div><div class="tl-stop-info"><span class="tl-stop-station">'+fromNameL+'</span>'+(depTrack?'<span class="tl-stop-platform">Pl. '+depTrack+'</span>':'')+'</div></div>';

        var shortDur = Math.round((leg.duration||0)/60);
        var durLabel = shortDur >= 60 ? Math.floor(shortDur/60)+'h'+(shortDur%60)+'m' : shortDur+'m';
        html += '<div class="tl-train"><div class="tl-train-gutter"><div class="tl-train-line-wrap"><span class="tl-dur-label">'+durLabel+'</span><div class="tl-train-line-bg"></div><div class="tl-train-line-fill" style="height:'+pct+'%"></div></div></div><div class="tl-train-body"><div class="tl-train-info" id="tlinfo_'+uid+'" onclick="toggleLegStops('+uid+',event)">'+(agency?opLink(trainLabel):'')+(routeName?'<span class="tl-nr">'+routeName+'</span>':'')+(direction?'<span class="tl-dir">'+direction+'</span>':'')+(stopCount>0?'<span class="tl-stops">'+stopCount+' stop'+(stopCount!==1?'s':'')+' <span class="tl-stops-arrow">\u25BC</span></span>':'')+'</div>';
        if (stopCount > 0) {
          html += '<div class="tl-stops-list" id="tlstops_'+uid+'"><div class="tl-stops-list-inner">';
          for (var si = 0; si < stops.length; si++) {
            var s = stops[si];
            var sTime = s.arrival||s.departure||'';
            html += '<div class="tl-stop-item"><span class="tl-stop-item-time">'+(sTime?fmtTime(sTime):'')+'</span><span class="tl-stop-item-dot"></span><span class="tl-stop-item-name">'+lookupDbStation(s.name||'', s.lat, s.lon)+'</span>'+(s.track?'<span class="tl-stop-item-track">Pl. '+s.track+'</span>':'')+'</div>';
          }
          html += '</div></div>';
        }
        html += '</div></div>';

        var arrTimeHtml = '';
        if (cancelled) {
          arrTimeHtml = '<div class="tl-stop-time tl-cancelled">'+fmtTime(arrScheduled)+'</div>';
        } else if (arrDelay > 0) {
          arrTimeHtml = '<div class="tl-stop-time">'+fmtTime(arrScheduled)+' <span class="tl-delay-inline">+'+arrDelay+'</span></div>';
        } else {
          arrTimeHtml = '<div class="tl-stop-time">'+arrTime+'</div>';
        }
        html += '<div class="tl-stop"><div class="tl-stop-time-col">'+arrTimeHtml+'</div><div class="tl-stop-dot"></div><div class="tl-stop-info"><span class="tl-stop-station">'+toNameL+'</span>'+(arrTrack?'<span class="tl-stop-platform">Pl. '+arrTrack+'</span>':'')+'</div></div>';

        if (li < legs.length - 1) {
          var nextLeg = legs[li+1];
          var nextDep = new Date(nextLeg.from.departure||nextLeg.startTime);
          var thisArr = leg.to&&leg.to.arrival ? new Date(leg.to.arrival) : null;
          if (thisArr && nextDep) {
            var xferMin = Math.round((nextDep - thisArr) / 60000);
            if (xferMin > 0) {
              html += '<div class="tl-xfer"><div class="tl-xfer-gutter"><div class="tl-xfer-dot"></div></div><div class="tl-xfer-text">'+xferMin+' min transfer</div></div>';
            }
          }
          html += '<div class="tl-leg-divider"><div class="tl-leg-divider-gutter"></div><div class="tl-leg-divider-line"></div></div>';
        }
      }
      return html;
    }

    function renderJourneys() {
      var resultsEl = document.getElementById('results');
      _legUid = 0;
      resultsEl.innerHTML = (prevPageCursor ? '<div class="page-nav"><button class="page-nav-btn earlier-btn" onclick="loadEarlier();event.stopPropagation()">Earlier</button></div>' : '') +
        currentJourneys.map(function(j, ji) {
          return renderJourneyCard(j, ji, ji === activeJourney);
        }).join('') +
        (nextPageCursor ? '<div class="page-nav"><button class="page-nav-btn later-btn" onclick="loadLater();event.stopPropagation()">Later</button></div>' : '');
    }

    // ── Save journeys ──
    var STORAGE_KEY = 'trackandtide:savedJourneys';

    function loadSavedJourneys() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
    }

    function saveSavedJourneys(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    var savedExpandedId = null;

    function saveJourney(idx) {
      var j = currentJourneys[idx];
      if (!j) return;
      var legs = (j.legs||[]).filter(function(l) { return l.mode !== 'WALK'; });
      var firstFrom = legs[0]&&legs[0].from;
      var fromName = lookupDbStation(firstFrom?firstFrom.name:'', firstFrom?firstFrom.lat:null, firstFrom?firstFrom.lon:null);
      var lastLeg = legs[legs.length-1];
      var lastTo = lastLeg&&lastLeg.to;
      var toName = lookupDbStation(lastTo?lastTo.name:'', lastTo?lastTo.lat:null, lastTo?lastTo.lon:null);
      var transitStart = legs[0] && (legs[0].from.departure || legs[0].startTime);
      var transitEnd = lastLeg && lastLeg.to && lastLeg.to.arrival;
      if (!transitEnd) return;
      // Deduplicate: don't save the same trip twice
      var saved = loadSavedJourneys();
      var dup = saved.find(function(s) {
        return s.fromTime === transitStart && s.toTime === transitEnd &&
          (s.fromStation&&s.fromStation.name) === (fromStation&&fromStation.name) &&
          (s.toStation&&s.toStation.name) === (toStation&&toStation.name);
      });
      if (dup) return; // already saved
      var durMin = transitDurMin(j);
      var entry = {
        id: Date.now(),
        fromName: fromName,
        toName: toName,
        fromTime: transitStart,
        toTime: transitEnd,
        fromStation: fromStation,
        toStation: toStation,
        duration: Math.floor(durMin/60)+'h '+(durMin%60)+'min',
        transfers: j.transfers||0,
        journey: j,
        savedAt: Date.now()
      };
      saved.unshift(entry);
      if (saved.length > 10) saved = saved.slice(0, 10);
      saveSavedJourneys(saved);
      renderSavedJourneys();
      // Highlight save button
      var btn = document.querySelector('.journey.expanded .save-btn');
      if (btn) { btn.classList.add('saved'); btn.textContent = 'Saved'; }
    }

    function removeSavedJourney(id) {
      if (!confirm('Remove this saved trip?')) return;
      var saved = loadSavedJourneys().filter(function(s) { return s.id !== id; });
      saveSavedJourneys(saved);
      renderSavedJourneys();
    }

    function renderSavedJourneys() {
      var el = document.getElementById('savedSection');
      if (!el) return;
      var now = Date.now();
      var saved = loadSavedJourneys().filter(function(s) {
        return new Date(s.toTime).getTime() > now;
      });
      if (saved.length !== loadSavedJourneys().length) saveSavedJourneys(saved);
      if (!saved.length) { el.style.display = 'none'; el.innerHTML = ''; savedExpandedId = null; return; }
      el.style.display = '';
      el.innerHTML = '<h3>Saved trips</h3>' + saved.map(function(s) {
        return renderJourneyCard(s.journey, null, savedExpandedId === s.id, s.id);
      }).join('');
    }

    function toggleSavedJourney(id) {
      savedExpandedId = savedExpandedId === id ? null : id;
      renderSavedJourneys();
    }

    function showSavedJourneyMap(id) {
      var saved = loadSavedJourneys().find(function(s) { return s.id === id; });
      if (!saved || !saved.journey) return;
      destroyMap();
      var mapDiv = document.getElementById('savedJourneyMap');
      if (!mapDiv) return;
      mapDiv.style.display = 'block';
      currentJourneys = [saved.journey];
      initMapInCard(saved.journey, 'savedJourneyMap');
      var btn = document.getElementById('mapBtn');
      if (btn) btn.style.display = 'none';
    }

    renderSavedJourneys();

    var root = document.documentElement;
    var logo = document.getElementById('logo');

    function applyTheme() {
      var saved = localStorage.getItem('trackandtide:theme');
      var isLight = saved ? saved === 'light' : window.matchMedia('(prefers-color-scheme: light)').matches;
      if (isLight) root.classList.add('light'); else root.classList.remove('light');
      if (logo) logo.src = isLight ? "trackandtide logo full.png" : "logo full light.png";
    }
    applyTheme();

    // Expose for footer.js — handles map re-creation on theme switch
    window.setTheme = function(mode) {
      if (mode === 'light') root.classList.add('light');
      else root.classList.remove('light');
      localStorage.setItem('trackandtide:theme', mode);
      if (logo) logo.src = mode === 'light' ? "trackandtide logo full.png" : "logo full light.png";
      if (journeyMap) {
        destroyMap();
        if (activeJourney >= 0 && currentJourneys[activeJourney]) {
          renderJourneys();
          setTimeout(function() { initMapInCard(currentJourneys[activeJourney]); }, 200);
        }
      }
    };

    // Hamburger menu
    var hamburgerBtn = document.getElementById('hamburgerBtn');
    var mainNav = document.getElementById('mainNav');

    hamburgerBtn.addEventListener('click', function() {
      var open = !mainNav.classList.contains('open');
      mainNav.classList.toggle('open', open);
      hamburgerBtn.classList.toggle('open', open);
      hamburgerBtn.setAttribute('aria-expanded', open);
    });

    mainNav.querySelectorAll('a').forEach(function(link) {
      link.addEventListener('click', function() {
        mainNav.classList.remove('open');
        hamburgerBtn.classList.remove('open');
        hamburgerBtn.setAttribute('aria-expanded', 'false');
      });
    });
  </script>

<script src="report-modal.js"></script>

<script src="bottom-nav.js?v=2"></script>
<script src="footer.js?v=4"></script>
